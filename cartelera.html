<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GuiaMadrid — Cartelera 20 marzo 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0c0c0c;--surface:#151515;--card:#181818;--text:#f0f0f0;--muted:#777;--dim:#999;--border:rgba(255,255,255,.07);--yellow:#f5c518;--yellow-dim:rgba(245,197,24,.15)}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::selection{background:var(--yellow);color:#000}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.018;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

.header{padding:1rem 2.5rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);background:var(--surface);gap:1rem;flex-wrap:wrap}
.header-left{display:flex;align-items:center;gap:1.2rem;flex:1;min-width:0}
.logo{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;font-weight:700;white-space:nowrap}
.logo span{color:var(--yellow)}
.search-wrap{position:relative;flex:1;max-width:420px;min-width:180px}
.search-input{width:100%;font-size:.85rem;font-weight:500;padding:.55rem 1rem .55rem 2.4rem;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:6px;color:var(--text);outline:none;transition:border-color .25s}
.search-input::placeholder{color:var(--muted)}
.search-input:focus{border-color:var(--yellow);background:rgba(255,255,255,.09)}
.search-icon{position:absolute;left:.8rem;top:50%;transform:translateY(-50%);width:16px;height:16px;pointer-events:none;opacity:.4}
.search-clear{position:absolute;right:.6rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;display:none}
.search-clear.visible{display:block}
.search-clear:hover{color:var(--text)}
.header-date{font-size:.78rem;color:var(--muted);font-weight:500;white-space:nowrap}

.toolbar{padding:.8rem 2.5rem;display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;background:rgba(12,12,12,.92);backdrop-filter:blur(20px)}
.pill{font-size:.78rem;font-weight:600;padding:.4rem 1rem;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:transparent;color:var(--muted);transition:all .25s}
.pill:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
.pill.active{color:#000;background:var(--yellow);border-color:var(--yellow)}
.divider{width:1px;height:20px;background:var(--border);margin:0 .3rem}
.toolbar-right{margin-left:auto;display:flex;gap:.6rem;align-items:center}
.cinema-select{font-size:.78rem;font-weight:500;background:var(--surface);color:var(--dim);border:1px solid var(--border);border-radius:4px;padding:.4rem .7rem;cursor:pointer;appearance:none;max-width:260px}
.cinema-select option{background:var(--surface);color:var(--text)}
.cinema-select:focus{outline:none;border-color:var(--yellow)}

.stats-bar{padding:.6rem 2.5rem;display:flex;gap:2rem;border-bottom:1px solid var(--border);background:var(--surface)}
.stat{font-size:.78rem;color:var(--muted);font-weight:500}
.stat strong{color:var(--yellow);font-size:1.05rem;font-weight:700;margin-right:.2rem}

.content{padding:1.5rem 2.5rem 4rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:1.2rem}
.movie-card{background:var(--card);border-radius:8px;overflow:hidden;border:1px solid var(--border);transition:border-color .3s,transform .3s}
.movie-card:hover{border-color:rgba(255,255,255,.15);transform:translateY(-2px)}

/* POSTER */
.poster-area{position:relative;aspect-ratio:16/9;overflow:hidden;background:#080808}
.poster-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 20%;transition:transform 6s cubic-bezier(.25,.1,.25,1),opacity .5s;opacity:0;z-index:1}
.poster-img.loaded{opacity:1}
.movie-card:hover .poster-img.loaded{transform:scale(1.04)}
/* CSS fallback gradient (shows behind image or when no image) */
.poster-fallback{position:absolute;inset:0}
.poster-shape{position:absolute;border-radius:50%;mix-blend-mode:screen;filter:blur(45px);opacity:.45;animation:float 14s ease-in-out infinite}
.poster-shape2{position:absolute;mix-blend-mode:screen;filter:blur(65px);opacity:.3;animation:drift 18s ease-in-out infinite reverse}
.poster-area::after{content:'';position:absolute;inset:0;background:linear-gradient(0deg,rgba(24,24,24,1) 0%,rgba(24,24,24,.6) 30%,rgba(0,0,0,.05) 60%,rgba(0,0,0,.3) 100%);z-index:2}
.poster-title{position:absolute;bottom:.8rem;left:1.2rem;right:1.2rem;z-index:3;font-family:'Space Grotesk',sans-serif;font-size:1.45rem;font-weight:700;line-height:1.1;letter-spacing:-.02em;text-shadow:0 2px 12px rgba(0,0,0,.8)}
.poster-director{position:absolute;top:.9rem;left:1.2rem;z-index:3;font-size:.7rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:rgba(255,255,255,.5)}
.poster-rating{position:absolute;top:.8rem;right:1.2rem;z-index:3;display:flex;align-items:center;gap:.3rem;background:rgba(0,0,0,.6);border-radius:4px;padding:.2rem .5rem}
.poster-rating .star{color:var(--yellow);font-size:.85rem}
.poster-rating .val{font-size:.85rem;font-weight:700}

.card-info{padding:1rem 1.2rem .5rem}
.card-tags{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.5rem}
.tag{font-size:.68rem;font-weight:600;padding:.15rem .5rem;background:rgba(255,255,255,.06);border-radius:3px;color:var(--dim)}
.card-synopsis{font-size:.82rem;line-height:1.55;color:var(--muted);margin-bottom:.6rem;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

.sessions-wrap{padding:.4rem 1.2rem 1.2rem}
.cinema-group{margin-bottom:.8rem}
.cinema-group:last-child{margin-bottom:0}
.cinema-label{font-size:.72rem;font-weight:600;color:var(--dim);margin-bottom:.35rem}
.time-chips{display:flex;flex-wrap:wrap;gap:5px}
.time-chip{font-size:.78rem;font-weight:600;padding:.35rem .7rem;border:1px solid rgba(255,255,255,.12);border-radius:5px;color:var(--text);background:rgba(255,255,255,.04);transition:all .2s;cursor:pointer}
.time-chip:hover{border-color:var(--yellow);color:var(--yellow);background:var(--yellow-dim)}
.time-chip.vose{border-color:rgba(245,197,24,.35);color:var(--yellow);background:var(--yellow-dim)}
.time-chip.imax{border-color:rgba(100,181,246,.4);color:#64b5f6;background:rgba(100,181,246,.08)}
.time-chip.atmos{border-color:rgba(206,147,216,.4);color:#ce93d8;background:rgba(206,147,216,.08)}
.time-chip.fdx{border-color:rgba(255,152,0,.4);color:#ffb74d;background:rgba(255,152,0,.08)}

.cinema-card{background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:1rem;overflow:hidden}
.cinema-card:hover{border-color:rgba(255,255,255,.12)}
.cinema-header{padding:1.2rem 1.5rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);background:var(--surface)}
.cinema-title{font-family:'Space Grotesk',sans-serif;font-size:1.15rem;font-weight:700}
.cinema-count{font-size:.75rem;font-weight:500;color:var(--muted)}
.cinema-body{padding:.5rem 0}
.movie-row{display:flex;gap:1rem;align-items:center;padding:.6rem 1.5rem;transition:background .2s}
.movie-row:hover{background:rgba(255,255,255,.03)}
.movie-row-title{flex:0 0 260px;font-size:.88rem;font-weight:600}
.movie-row-rating{flex:0 0 55px;display:flex;align-items:center;gap:.2rem}
.movie-row-rating .star{color:var(--yellow);font-size:.75rem}
.movie-row-rating .val{font-size:.78rem;font-weight:600;color:var(--dim)}
.movie-row-times{flex:1;display:flex;flex-wrap:wrap;gap:4px}

.empty{text-align:center;padding:5rem 2rem;font-size:.9rem;color:var(--muted)}
footer{border-top:1px solid var(--border);padding:1.5rem 2.5rem;display:flex;justify-content:space-between;font-size:.72rem;color:var(--muted)}

@keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(25px,-18px) scale(1.08)}66%{transform:translate(-18px,12px) scale(.94)}}
@keyframes drift{0%,100%{transform:translate(0,0) rotate(0deg)}50%{transform:translate(-35px,20px) rotate(12deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.grid>*,.cinema-card{animation:fadeUp .4s ease both}
.grid>*:nth-child(n){animation-delay:calc(.04s * var(--i,0))}

@media(max-width:768px){
.header,.toolbar,.stats-bar,.content,footer{padding-left:1.2rem;padding-right:1.2rem}
.grid{grid-template-columns:1fr}
.movie-row{flex-direction:column;gap:.3rem;align-items:flex-start}
.movie-row-title{flex:none}
.toolbar-right{margin-left:0;width:100%}
.cinema-select{width:100%;max-width:none}
.poster-title{font-size:1.2rem}
.search-wrap{max-width:none}
}
</style>
</head>

":"Un grupo de adolescentes desata un antiguo mal en un pueblo rural irlandés. Con Dafne Keen."},{"title":"Perfect Blue (Reestreno)","director":"Satoshi Kon","genre":"Animación, Thriller","dur":81,"rating":4.5,"synopsis":"Mima deja su carrera como estrella del pop para convertirse en actriz. Pronto una presencia siniestra la persigue. Clásico de 1997."},{"title":"Elegir mi vida","director":"Amélie Bonnin","genre":"Drama","dur":98,"rating":3.5,"synopsis":"Cécile abandona su sueño de abrir un restaurante para cuidar a su padre enfermo. El reencuentro con su primer amor la lleva a cuestionar sus decisiones."},{"title":"La Grazia","director":"Paolo Sorrentino","genre":"Drama","dur":130,"rating":4.0,"synopsis":"El presidente saliente de Italia enfrenta dilemas morales y personales. Con Toni Servillo. La nueva obra del director ganador del Oscar."},{"title":"El mago del Kremlin","director":"Olivier Assayas","genre":"Thriller, Drama","dur":120,"rating":3.7,"synopsis":"Un joven cineasta ruso se convierte en asesor inesperado de Putin. Con Jude Law, Paul Dano y Alicia Vikander."},{"title":"La última cena","director":"","genre":"Thriller","dur":105,"rating":3.3,"synopsis":"Una cena entre viejos amigos se convierte en una noche de revelaciones y tensiones mortales."},{"title":"La sonrisa del mal","director":"","genre":"Terror","dur":92,"rating":2.9,"synopsis":"Una psicóloga descubre que la sonrisa de sus pacientes oculta algo terrorífico."},{"title":"Tafiti y sus amigos","director":"","genre":"Animación","dur":78,"rating":3.2,"synopsis":"Un pequeño suricato se embarca en una aventura por la sabana africana con sus inseparables amigos."},{"title":"Una hija en Tokio","director":"","genre":"Drama","dur":108,"rating":3.8,"synopsis":"Una madre viaja a Tokio para reconectar con su hija, que lleva años viviendo en Japón."}],"c":["Cines Callao","Yelmo Ideal","Cinesa Proyecciones","Yelmo Luxury Palafox","Cines Renoir Princesa","Renoir Plaza de España","Cines Verdi","Cine Doré (Filmoteca)","Cines Embajadores","Cines Golem","Cinesa Méndez Álvaro","Cinesa Manoteras","mk2 Palacio de Hielo","Cinesa Príncipe Pío","Yelmo La Vaguada","Yelmo Plenilunio","Yelmo Islazul","Cinesa La Gavia","Cinesa Equinoccio (Majadahonda)","Cinesa Parquesur (Leganés)","Yelmo Plaza Norte 2 (S.S. Reyes)","Yelmo Tres Aguas (Alcorcón)","Kinépolis (Pozuelo)","Cinesa Las Rozas"]};
const S=RAW.s,M=RAW.m,C=RAW.c;
let view='movies',vose=false,searchQuery='';

const POSTERS={
'Amarga Navidad':'https://image.tmdb.org/t/p/w780' + '/placeholder',
'Hoppers':'http://www.impawards.com/2026/posters/hoppers_xlg.jpg',
'Torrente Presidente':'https://pics.filmaffinity.com/torrente_presidente-453739-large.jpg',
'Your Name (Reposición)':'https://image.tmdb.org/t/p/w780/xq1Ugd62d23K2knRUx6xxuALTZB.jpg',
'La novia':'http://www.impawards.com/2026/posters/bride_xlg.jpg',
'Scream VII':'http://www.impawards.com/2026/posters/scream_seven_xlg.jpg',
'Greenland 2: El regreso':'http://www.impawards.com/2026/posters/greenland_migration_xlg.jpg',
'Whistle: El silbido del mal':'http://www.impawards.com/intl/canada/2026/posters/whistle_xlg.jpg',
'Perfect Blue (Reestreno)':'https://image.tmdb.org/t/p/w780/79KBBkNSQYtoRvMsGEQnFVE4Wfl.jpg',
'La Grazia':'http://www.impawards.com/intl/italy/2025/posters/la_grazia_xlg.jpg',
'El mago del Kremlin':'http://www.impawards.com/intl/france/2026/posters/le_mage_du_kremlin_xlg.jpg',

const VIS={
'Amarga Navidad':{bg:'radial-gradient(ellipse at 30% 40%,#5c0a0a,#1a0000 60%,#080000)',s1:'#d32f2f',s2:'#ff8a80'},
'Hoppers':{bg:'radial-gradient(ellipse at 55% 45%,#0d3b0d,#001a00 55%,#000800)',s1:'#66bb6a',s2:'#aed581'},
'Torrente Presidente':{bg:'radial-gradient(ellipse at 50% 55%,#3e2723,#1a0e0a 55%,#080400)',s1:'#ff8f00',s2:'#ffe082'},
'Your Name (Reposición)':{bg:'radial-gradient(ellipse at 38% 28%,#0a1a4e,#000a1a 55%,#000006)',s1:'#42a5f5',s2:'#ef5350'},
'La novia':{bg:'radial-gradient(ellipse at 48% 42%,#222,#0c0c0c 55%,#000)',s1:'#e0e0e0',s2:'#757575'},
'Scream VII':{bg:'radial-gradient(ellipse at 45% 52%,#2a0000,#0a0000 55%,#000)',s1:'#d50000',s2:'#fff'},

'Tafiti y sus amigos':{bg:'radial-gradient(ellipse at 48% 48%,#1e1e00,#0a0a00 55%,#000)',s1:'#ffa726',s2:'#66bb6a'},

};

// === SEARCH ===
const searchInput=document.getElementById('searchInput');
const searchClear=document.getElementById('searchClear');
let searchTimer;
searchInput.addEventListener('input',function(){
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{searchQuery=this.value.trim().toLowerCase();searchClear.classList.toggle('visible',searchQuery.length>0);render()},120);
});
searchClear.addEventListener('click',function(){searchInput.value='';searchQuery='';this.classList.remove('visible');render();searchInput.focus()});
document.addEventListener('keydown',function(e){if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();searchInput.focus();searchInput.select()}if(e.key==='Escape'&&document.activeElement===searchInput)searchInput.blur()});

const cinemaFilter=document.getElementById('cinemaFilter');
C.forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n;cinemaFilter.appendChild(o)});
cinemaFilter.addEventListener('change',render);

document.querySelectorAll('.pill[data-view]').forEach(btn=>{
  btn.addEventListener('click',()=>{document.querySelectorAll('.pill[data-view]').forEach(b=>b.classList.remove('active'));btn.classList.add('active');view=btn.dataset.view;render()});
});
document.getElementById('voseToggle').addEventListener('click',function(){vose=!vose;this.classList.toggle('active',vose);render()});

function normalize(s){return(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase()}
function getFiltered(){
  let f=S;
  if(cinemaFilter.value)f=f.filter(s=>s.c===cinemaFilter.value);
  if(vose)f=f.filter(s=>s.l==='VOSE');
  if(searchQuery){const q=normalize(searchQuery);f=f.filter(s=>normalize(s.m).includes(q)||normalize(s.c).includes(q))}
  return f;
}
function renderStats(f){
  const mc=new Set(f.map(s=>s.m)).size,cc=new Set(f.map(s=>s.c)).size,vc=f.filter(s=>s.l==='VOSE').length;
  document.getElementById('stats').innerHTML=`<div class="stat"><strong>${mc}</strong> peliculas</div><div class="stat"><strong>${f.length}</strong> sesiones</div><div class="stat"><strong>${cc}</strong> cines</div><div class="stat"><strong>${vc}</strong> VOSE</div>`;
}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function posterHTML(title){
  const url=POSTERS[title];
  const v=VIS[title]||{bg:'radial-gradient(ellipse at 50% 50%,#1a1a1a,#000)',s1:'#555',s2:'#333'};
  let h='<div class="poster-area"><div class="poster-fallback" style="background:'+v.bg+'">';
  h+='<div class="poster-shape" style="background:'+v.s1+';left:30%;top:30%;width:180px;height:180px"></div>';
  h+='<div class="poster-shape2" style="background:'+v.s2+';left:60%;top:55%;width:140px;height:140px"></div></div>';
  if(url&&!url.includes('placeholder'))h+='<img class="poster-img" src="'+url+'" alt="" loading="lazy" onload="this.classList.add(\'loaded\')" onerror="this.style.display=\'none\'">';
  return h;
}

function render(){
  const f=getFiltered();renderStats(f);
  if(view==='movies')renderMovies(f);else renderCinemas(f);
}

function renderMovies(f){
  const container=document.getElementById('container');
  const map=new Map();
  f.forEach(s=>{if(!map.has(s.m)){const mv=M.find(x=>x.title===s.m)||{};map.set(s.m,{...mv,title:s.m,sts:[]})}map.get(s.m).sts.push(s)});
  if(!map.size){container.className='empty';container.innerHTML='No hay sesiones con estos filtros.';return}
  const movies=[...map.values()].sort((a,b)=>(b.rating||0)-(a.rating||0));
  container.className='grid';
  container.innerHTML=movies.map((mv,i)=>{
    const byCinema={};mv.sts.forEach(s=>{(byCinema[s.c]=byCinema[s.c]||[]).push(s)});
    const rH=mv.rating?'<div class="poster-rating"><span class="star">\u2605</span><span class="val">'+mv.rating.toFixed(1)+'</span></div>':'';
    const tags=[mv.genre,mv.dur?mv.dur+' min':''].filter(Boolean).map(t=>'<span class="tag">'+esc(t)+'</span>').join('');
    const groups=Object.entries(byCinema).sort((a,b)=>a[0].localeCompare(b[0])).map(([c,ss])=>{
      const chips=ss.sort((a,b)=>a.t.localeCompare(b.t)).map(s=>{
        let cls='time-chip';if(s.l==='VOSE')cls+=' vose';if(s.f==='IMAX')cls+=' imax';else if(s.f==='Atmos')cls+=' atmos';else if(s.f==='4DX')cls+=' fdx';
        return'<span class="'+cls+'">'+s.t+(s.l==='VOSE'?' VOSE':'')+(s.f!=='2D'?' '+s.f:'')+'</span>';
      }).join('');
      return'<div class="cinema-group"><div class="cinema-label">'+esc(c)+'</div><div class="time-chips">'+chips+'</div></div>';
    }).join('');
    return'<div class="movie-card" style="--i:'+i+'">'+posterHTML(mv.title)+'<div class="poster-director">'+esc(mv.director)+'</div>'+rH+'<div class="poster-title">'+esc(mv.title)+'</div></div><div class="card-info"><div class="card-tags">'+tags+'</div><div class="card-synopsis">'+esc(mv.synopsis)+'</div></div><div class="sessions-wrap">'+groups+'</div></div>';
  }).join('');
}

function renderCinemas(f){
  const container=document.getElementById('container');
  const map=new Map();
  f.forEach(s=>{(map.has(s.c)?map.get(s.c):map.set(s.c,[]).get(s.c)).push(s)});
  if(!map.size){container.className='empty';container.innerHTML='No hay sesiones con estos filtros.';return}
  container.className='';
  container.innerHTML=[...map.entries()].sort((a,b)=>a[0].localeCompare(b[0])).map(([cinema,sts])=>{
    const byMovie={};sts.forEach(s=>{(byMovie[s.m]=byMovie[s.m]||[]).push(s)});
    const rows=Object.entries(byMovie).sort((a,b)=>a[0].localeCompare(b[0])).map(([movie,sessions])=>{
      const mv=M.find(x=>x.title===movie)||{};
      const chips=sessions.sort((a,b)=>a.t.localeCompare(b.t)).map(s=>{
        let cls='time-chip';if(s.l==='VOSE')cls+=' vose';if(s.f==='IMAX')cls+=' imax';else if(s.f==='Atmos')cls+=' atmos';else if(s.f==='4DX')cls+=' fdx';
        return'<span class="'+cls+'">'+s.t+(s.l==='VOSE'?' VOSE':'')+(s.f!=='2D'?' '+s.f:'')+'</span>';
      }).join('');
      return'<div class="movie-row"><div class="movie-row-title">'+esc(movie)+'</div><div class="movie-row-rating">'+(mv.rating?'<span class="star">\u2605</span><span class="val">'+mv.rating.toFixed(1)+'</span>':'')+'</div><div class="movie-row-times">'+chips+'</div></div>';
    }).join('');
    return'<div class="cinema-card"><div class="cinema-header"><div class="cinema-title">'+esc(cinema)+'</div><div class="cinema-count">'+sts.length+' sesiones \u00b7 '+Object.keys(byMovie).length+' peliculas</div></div><div class="cinema-body">'+rows+'</div></div>';
  }).join('');
}

render();
</script>
