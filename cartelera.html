<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GuiaMadrid — Cartelera 20 marzo 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#000;--card:#0a0a0a;--text:#fff;--muted:#555;--dim:#888;--border:rgba(255,255,255,.08);--accent:#fff}
html{scroll-behavior:smooth}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::selection{background:#fff;color:#000}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#000}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}

/* === HEADER === */
.header{padding:2rem 3rem;display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1px solid var(--border)}
.logo{font-family:'Space Mono',monospace;font-size:.85rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
.logo strong{color:#fff;font-weight:700}
.header-date{font-family:'Space Mono',monospace;font-size:.75rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}

/* === HERO === */
.hero{padding:4rem 3rem 2rem;border-bottom:1px solid var(--border)}
.hero h1{font-size:clamp(3rem,8vw,7rem);font-weight:300;line-height:.95;letter-spacing:-.03em;text-transform:uppercase}
.hero h1 em{font-style:italic;font-weight:300;color:var(--muted)}

/* === TOOLBAR === */
.toolbar{padding:1.2rem 3rem;display:flex;gap:1rem;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;background:rgba(0,0,0,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.pill{font-family:'Space Mono',monospace;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;padding:.5rem 1.2rem;border:1px solid var(--border);border-radius:0;cursor:pointer;background:transparent;color:var(--muted);transition:all .3s cubic-bezier(.4,0,.2,1)}
.pill:hover{color:#fff;border-color:rgba(255,255,255,.3)}
.pill.active{color:#000;background:#fff;border-color:#fff}
.pill.vose{border-color:rgba(255,255,255,.15)}
.pill.vose.active{background:#fff;color:#000;border-color:#fff}
.divider{width:1px;height:20px;background:var(--border);margin:0 .5rem}
.cinema-select{font-family:'Space Mono',monospace;font-size:.7rem;letter-spacing:.05em;text-transform:uppercase;background:transparent;color:var(--muted);border:1px solid var(--border);padding:.5rem .8rem;cursor:pointer;appearance:none;-webkit-appearance:none;max-width:240px}
.cinema-select option{background:#111;color:#fff}
.cinema-select:focus{outline:none;border-color:rgba(255,255,255,.4);color:#fff}
.toolbar-right{margin-left:auto;display:flex;align-items:center;gap:.8rem}

/* === STATS BAR === */
.stats-bar{padding:1rem 3rem;display:flex;gap:2.5rem;border-bottom:1px solid var(--border)}
.stat{font-family:'Space Mono',monospace;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.stat strong{color:#fff;font-size:1.1rem;font-weight:700;margin-right:.3rem}

/* === GRID === */
.content{padding:2rem 3rem 4rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:1px;background:var(--border)}
.grid>*{background:var(--bg)}

/* === MOVIE CARD === */
.movie-card{position:relative;overflow:hidden;cursor:default;transition:background .4s}
.movie-card:hover{background:#0a0a0a}
.poster-area{position:relative;aspect-ratio:16/9;overflow:hidden;background:#080808}
.poster-gradient{position:absolute;inset:0;opacity:.85;transition:opacity .5s}
.poster-area::after{content:'';position:absolute;inset:0;background:linear-gradient(0deg,#000 0%,transparent 60%)}
.movie-card:hover .poster-gradient{opacity:1;transform:scale(1.03);transition:transform 8s cubic-bezier(.4,0,.2,1),opacity .5s}
.poster-title{position:absolute;bottom:1rem;left:1.2rem;right:1.2rem;z-index:2;font-size:1.5rem;font-weight:600;line-height:1.1;letter-spacing:-.02em;text-transform:uppercase}
.poster-director{position:absolute;bottom:auto;top:1rem;left:1.2rem;z-index:2;font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.5)}
.poster-rating{position:absolute;top:1rem;right:1.2rem;z-index:2;font-family:'Space Mono',monospace;font-size:.75rem;color:rgba(255,255,255,.7)}

.card-body{padding:1.2rem}
.card-meta{font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem;line-height:1.6}
.card-synopsis{font-size:.8rem;line-height:1.6;color:var(--dim);margin-bottom:1rem;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* === SESSIONS === */
.sessions-wrap{padding:0 1.2rem 1.2rem}
.cinema-group{margin-bottom:.8rem}
.cinema-group:last-child{margin-bottom:0}
.cinema-label{font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.35rem}
.time-chips{display:flex;flex-wrap:wrap;gap:4px}
.time-chip{font-family:'Space Mono',monospace;font-size:.68rem;padding:.25rem .55rem;border:1px solid var(--border);color:var(--dim);letter-spacing:.03em;transition:all .25s}
.time-chip:hover{border-color:rgba(255,255,255,.4);color:#fff}
.time-chip.vose{border-color:rgba(255,255,255,.25);color:#fff}
.time-chip.imax{border-color:rgba(100,181,246,.4);color:#64b5f6}
.time-chip.atmos{border-color:rgba(206,147,216,.4);color:#ce93d8}

/* === CINEMA CARD === */
.cinema-card{padding:2rem 1.5rem;border-bottom:1px solid var(--border)}
.cinema-card:last-child{border-bottom:none}
.cinema-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:1.5rem}
.cinema-title{font-size:1.3rem;font-weight:600;letter-spacing:-.01em;text-transform:uppercase}
.cinema-count{font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.movie-row{display:flex;gap:1rem;align-items:baseline;padding:.6rem 0;border-top:1px solid var(--border)}
.movie-row:first-child{border-top:none}
.movie-row-title{flex:0 0 280px;font-size:.85rem;font-weight:500}
.movie-row-rating{flex:0 0 50px;font-family:'Space Mono',monospace;font-size:.7rem;color:var(--muted)}
.movie-row-times{flex:1;display:flex;flex-wrap:wrap;gap:4px}

/* === EMPTY STATE === */
.empty{text-align:center;padding:6rem 2rem;font-family:'Space Mono',monospace;font-size:.8rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}

/* === FOOTER === */
footer{border-top:1px solid var(--border);padding:2rem 3rem;display:flex;justify-content:space-between;font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}

/* === RESPONSIVE === */
@media(max-width:768px){
  .header,.hero,.toolbar,.stats-bar,.content,footer{padding-left:1.5rem;padding-right:1.5rem}
  .hero h1{font-size:clamp(2.2rem,12vw,4rem)}
  .grid{grid-template-columns:1fr}
  .movie-row{flex-direction:column;gap:.4rem}
  .movie-row-title{flex:none}
  .toolbar{gap:.5rem}
  .toolbar-right{margin-left:0;width:100%}
  .cinema-select{width:100%;max-width:none}
}

/* === ANIMATIONS === */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.grid>*{animation:fadeIn .4s ease both}
.grid>*:nth-child(1){animation-delay:0s}
.grid>*:nth-child(2){animation-delay:.05s}
.grid>*:nth-child(3){animation-delay:.1s}
.grid>*:nth-child(4){animation-delay:.15s}
.grid>*:nth-child(5){animation-delay:.2s}
.grid>*:nth-child(6){animation-delay:.25s}
.grid>*:nth-child(7){animation-delay:.3s}
.grid>*:nth-child(8){animation-delay:.35s}
.grid>*:nth-child(9){animation-delay:.4s}

/* Noise texture overlay */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
</style>
</head>

const gradientMap=new Map();
let gi=0;
function getGradient(title){
  if(!gradientMap.has(title))gradientMap.set(title,GRADIENTS[gi++%GRADIENTS.length]);
  return gradientMap.get(title);
}

const cinemaFilter=document.getElementById('cinemaFilter');
C.forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n;cinemaFilter.appendChild(o)});
cinemaFilter.addEventListener('change',render);

document.querySelectorAll('.pill[data-view]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.pill[data-view]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    view=btn.dataset.view;
    render();
  });
});

document.getElementById('voseToggle').addEventListener('click',function(){
  vose=!vose;
  this.classList.toggle('active',vose);
  render();
});

function getFiltered(){
  let f=S;
  if(cinemaFilter.value)f=f.filter(s=>s.c===cinemaFilter.value);
  if(vose)f=f.filter(s=>s.l==='VOSE');
  return f;
}

function renderStats(f){
  const mc=new Set(f.map(s=>s.m)).size;
  const cc=new Set(f.map(s=>s.c)).size;
  const vc=f.filter(s=>s.l==='VOSE').length;
  document.getElementById('stats').innerHTML=
    `<div class="stat"><strong>${mc}</strong>Peliculas</div>`+
    `<div class="stat"><strong>${f.length}</strong>Sesiones</div>`+
    `<div class="stat"><strong>${cc}</strong>Cines</div>`+
    `<div class="stat"><strong>${vc}</strong>VOSE</div>`;
}

function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function render(){
  const f=getFiltered();
  renderStats(f);
  if(view==='movies')renderMovies(f);
  else renderCinemas(f);
}

function renderMovies(f){
  const container=document.getElementById('container');
  const map=new Map();
  f.forEach(s=>{
    if(!map.has(s.m)){
      const mv=M.find(x=>x.title===s.m)||{};
      map.set(s.m,{...mv,title:s.m,sts:[]});
    }
    map.get(s.m).sts.push(s);
  });
  if(!map.size){container.className='empty';container.textContent='No hay sesiones con estos filtros';return}
  const movies=[...map.values()].sort((a,b)=>(b.rating||0)-(a.rating||0));
  container.className='grid';
  container.innerHTML=movies.map(mv=>{
    const byCinema={};
    mv.sts.forEach(s=>{(byCinema[s.c]=byCinema[s.c]||[]).push(s)});
    const meta=[mv.director,mv.genre,mv.dur?mv.dur+' min':''].filter(Boolean).join(' · ');
    const rating=mv.rating?`★ ${mv.rating.toFixed(1)}`:'';
    const groups=Object.entries(byCinema).sort((a,b)=>a[0].localeCompare(b[0])).map(([cinema,sts])=>{
      const chips=sts.sort((a,b)=>a.t.localeCompare(b.t)).map(s=>{
        let cls='time-chip';
        if(s.l==='VOSE')cls+=' vose';
        if(s.f==='IMAX')cls+=' imax';
        else if(s.f==='Atmos')cls+=' atmos';
        return`<span class="${cls}">${s.t}${s.l==='VOSE'?' VOSE':''}${s.f!=='2D'?' '+s.f:''}</span>`;
      }).join('');
      return`<div class="cinema-group"><div class="cinema-label">${esc(cinema)}</div><div class="time-chips">${chips}</div></div>`;
    }).join('');
    return`<div class="movie-card">
      <div class="poster-area">
        <div class="poster-gradient" style="background:${getGradient(mv.title)}"></div>
        <div class="poster-director">${esc(mv.director)}</div>
        <div class="poster-rating">${rating}</div>
        <div class="poster-title">${esc(mv.title)}</div>
      </div>
      <div class="card-body">
        <div class="card-meta">${esc(meta)}</div>
        <div class="card-synopsis">${esc(mv.synopsis)}</div>
      </div>
      <div class="sessions-wrap">${groups}</div>
    </div>`;
  }).join('');
}

function renderCinemas(f){
  const container=document.getElementById('container');
  const map=new Map();
  f.forEach(s=>{(map.has(s.c)?map.get(s.c):map.set(s.c,[]).get(s.c)).push(s)});
  if(!map.size){container.className='empty';container.textContent='No hay sesiones con estos filtros';return}
  container.className='';
  container.innerHTML=[...map.entries()].sort((a,b)=>a[0].localeCompare(b[0])).map(([cinema,sts])=>{
    const byMovie={};
    sts.forEach(s=>{(byMovie[s.m]=byMovie[s.m]||[]).push(s)});
    const rows=Object.entries(byMovie).sort((a,b)=>a[0].localeCompare(b[0])).map(([movie,sessions])=>{
      const mv=M.find(x=>x.title===movie)||{};
      const chips=sessions.sort((a,b)=>a.t.localeCompare(b.t)).map(s=>{
        let cls='time-chip';
        if(s.l==='VOSE')cls+=' vose';
        if(s.f==='IMAX')cls+=' imax';
        else if(s.f==='Atmos')cls+=' atmos';
        return`<span class="${cls}">${s.t}${s.l==='VOSE'?' VOSE':''}${s.f!=='2D'?' '+s.f:''}</span>`;
      }).join('');
      return`<div class="movie-row">
        <div class="movie-row-title">${esc(movie)}</div>
        <div class="movie-row-rating">${mv.rating?'★ '+mv.rating.toFixed(1):''}</div>
        <div class="movie-row-times">${chips}</div>
      </div>`;
    }).join('');
    return`<div class="cinema-card">
      <div class="cinema-header">
        <div class="cinema-title">${esc(cinema)}</div>
        <div class="cinema-count">${sts.length} sesiones · ${Object.keys(byMovie).length} peliculas</div>
      </div>
      ${rows}
    </div>`;
  }).join('');
}

render();
</script>
</body>
</html>
