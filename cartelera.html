<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f0f;--card:#1a1a2e;--accent:#e94560;--text:#eee;--muted:#888;--border:#2a2a3e;--gold:#f5c518}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:1.2rem 2rem;border-bottom:2px solid var(--accent);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem}
header h1{font-size:1.5rem;font-weight:700}
header h1 span{color:var(--accent)}
.date-label{color:var(--muted);font-size:.9rem}
.controls{display:flex;gap:.6rem;align-items:center;flex-wrap:wrap}
.controls select{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:.4rem .5rem;font-size:.85rem}
.toolbar{display:flex;gap:.5rem;padding:1rem 2rem;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--border)}
.view-btn,.vose-btn{padding:.45rem 1rem;border-radius:20px;cursor:pointer;font-size:.82rem;transition:all .2s;border:1px solid var(--border);background:var(--card);color:var(--muted)}
.view-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.vose-btn{border-color:#4caf50;color:#81c784}
.vose-btn.active{background:#4caf50;border-color:#4caf50;color:#fff}
.separator{width:1px;height:24px;background:var(--border);margin:0 .5rem}
.content{padding:1.2rem 2rem}
.stats{display:flex;gap:1.2rem;margin-bottom:1.2rem;flex-wrap:wrap}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.6rem 1rem;min-width:100px}
.stat-box .num{font-size:1.6rem;font-weight:700;color:var(--accent)}
.stat-box .label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:transform .2s,border-color .2s}
.card:hover{transform:translateY(-2px);border-color:var(--accent)}
.card .top{padding:1rem 1.2rem}
.card .title{font-size:1.05rem;font-weight:600;margin-bottom:.3rem;line-height:1.3}
.card .meta{font-size:.8rem;color:var(--muted);line-height:1.5}
.card .synopsis{font-size:.78rem;color:#aaa;margin-top:.4rem;line-height:1.4}
.card .rating{display:inline-flex;align-items:center;gap:.2rem;color:var(--gold);font-weight:600;font-size:.9rem;margin-top:.3rem}
.card .sessions{border-top:1px solid var(--border);padding:.7rem 1rem}
.cinema-group{margin-bottom:.5rem}
.cinema-group:last-child{margin-bottom:0}
.cinema-name{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:.25rem}
.chips{display:flex;flex-wrap:wrap;gap:.25rem}
.chip{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:.15rem .45rem;font-size:.75rem;white-space:nowrap}
.chip.vose{border-color:#4caf50;color:#81c784}
.chip.imax{border-color:#2196f3;color:#64b5f6}
.chip.atmos{border-color:#9c27b0;color:#ce93d8}
.chip.isense{border-color:#00bcd4;color:#4dd0e1}
.movie-in-cinema{margin-bottom:.6rem}
.movie-in-cinema:last-child{margin-bottom:0}
.movie-in-cinema .mv-title{font-size:.85rem;font-weight:600;margin-bottom:.2rem}
.movie-in-cinema .mv-meta{font-size:.72rem;color:var(--muted);margin-bottom:.2rem}
.empty{text-align:center;padding:3rem;color:var(--muted)}
@media(max-width:600px){header,.toolbar,.content{padding-left:1rem;padding-right:1rem}.grid{grid-template-columns:1fr}}
</style>
</head>

const allShowtimes=RAW.s.map(s=>({cinema:s.c,movie:s.m,time:s.t,language:s.l,format:s.f}));
const allMovies=RAW.m;
const allCinemas=RAW.c;
let currentView='movies';
let voseOnly=false;

const cinemaFilter=document.getElementById('cinemaFilter');
allCinemas.forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n;cinemaFilter.appendChild(o)});
cinemaFilter.addEventListener('change',render);

document.querySelectorAll('.view-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentView=btn.dataset.view;
    render();
  });
});

document.getElementById('voseToggle').addEventListener('click',function(){
  voseOnly=!voseOnly;
  this.classList.toggle('active',voseOnly);
  render();
});

function getFiltered(){
  let f=allShowtimes;
  if(cinemaFilter.value)f=f.filter(s=>s.cinema===cinemaFilter.value);
  if(voseOnly)f=f.filter(s=>s.language==='VOSE');
  return f;
}

function renderStats(filtered){
  const mc=new Set(filtered.map(s=>s.movie)).size;
  const cc=new Set(filtered.map(s=>s.cinema)).size;
  const vc=filtered.filter(s=>s.language==='VOSE').length;
  document.getElementById('stats').innerHTML=`
    <div class="stat-box"><div class="num">${mc}</div><div class="label">Peliculas</div></div>
    <div class="stat-box"><div class="num">${filtered.length}</div><div class="label">Sesiones</div></div>
    <div class="stat-box"><div class="num">${cc}</div><div class="label">Cines</div></div>
    <div class="stat-box"><div class="num">${vc}</div><div class="label">VOSE</div></div>`;
}

function render(){
  const filtered=getFiltered();
  renderStats(filtered);
  if(currentView==='movies')renderByMovies(filtered);
  else renderByCinemas(filtered);
}

function renderByMovies(filtered){
  const container=document.getElementById('container');
  const movieMap=new Map();
  filtered.forEach(s=>{
    if(!movieMap.has(s.movie)){
      const mv=allMovies.find(m=>m.title===s.movie)||{};
      movieMap.set(s.movie,{...mv,title:s.movie,showtimes:[]});
    }
    movieMap.get(s.movie).showtimes.push(s);
  });
  if(movieMap.size===0){container.className='empty';container.textContent='No hay sesiones para este filtro.';return}
  const movies=[...movieMap.values()].sort((a,b)=>(b.rating||0)-(a.rating||0));
  container.className='grid';
  container.innerHTML=movies.map(mv=>{
    const byCinema={};
    mv.showtimes.forEach(s=>{if(!byCinema[s.cinema])byCinema[s.cinema]=[];byCinema[s.cinema].push(s)});
    const rH=mv.rating?`<div class="rating">&#9733; ${mv.rating.toFixed(1)}</div>`:'';
    const meta=[mv.director,mv.genre,mv.dur?mv.dur+' min':null].filter(Boolean);
    const syn=mv.synopsis?`<div class="synopsis">${esc(mv.synopsis)}</div>`:'';
    const groups=Object.entries(byCinema).sort((a,b)=>a[0].localeCompare(b[0])).map(([cinema,sts])=>{
      const chips=sts.sort((a,b)=>a.time.localeCompare(b.time)).map(s=>{
        let cls='chip';
        if(s.language==='VOSE')cls+=' vose';
        if(s.format==='IMAX')cls+=' imax';
        else if(s.format==='Atmos')cls+=' atmos';
        else if(s.format==='iSense')cls+=' isense';
        const lbl=s.time+(s.language==='VOSE'?' VOSE':'')+(s.format!=='2D'?' '+s.format:'');
        return `<span class="${cls}">${lbl}</span>`;
      }).join('');
      return `<div class="cinema-group"><div class="cinema-name">${esc(cinema)}</div><div class="chips">${chips}</div></div>`;
    }).join('');
    return `<div class="card"><div class="top"><div class="title">${esc(mv.title)}</div><div class="meta">${esc(meta.join(' \u00B7 '))}</div>${rH}${syn}</div><div class="sessions">${groups}</div></div>`;
  }).join('');
}

function renderByCinemas(filtered){
  const container=document.getElementById('container');
  const cinemaMap=new Map();
  filtered.forEach(s=>{
    if(!cinemaMap.has(s.cinema))cinemaMap.set(s.cinema,[]);
    cinemaMap.get(s.cinema).push(s);
  });
  if(cinemaMap.size===0){container.className='empty';container.textContent='No hay sesiones para este filtro.';return}
  container.className='grid';
  container.innerHTML=[...cinemaMap.entries()].sort((a,b)=>a[0].localeCompare(b[0])).map(([cinema,sts])=>{
    const byMovie={};
    sts.forEach(s=>{if(!byMovie[s.movie])byMovie[s.movie]=[];byMovie[s.movie].push(s)});
    const movieGroups=Object.entries(byMovie).sort((a,b)=>a[0].localeCompare(b[0])).map(([movie,sessions])=>{
      const mv=allMovies.find(m=>m.title===movie)||{};
      const metaParts=[mv.director,mv.genre].filter(Boolean);
      const chips=sessions.sort((a,b)=>a.time.localeCompare(b.time)).map(s=>{
        let cls='chip';
        if(s.language==='VOSE')cls+=' vose';
        if(s.format==='IMAX')cls+=' imax';
        else if(s.format==='Atmos')cls+=' atmos';
        else if(s.format==='iSense')cls+=' isense';
        const lbl=s.time+(s.language==='VOSE'?' VOSE':'')+(s.format!=='2D'?' '+s.format:'');
        return `<span class="${cls}">${lbl}</span>`;
      }).join('');
      return `<div class="movie-in-cinema"><div class="mv-title">${esc(movie)}${mv.rating?' <span style="color:var(--gold)">\u2605 '+mv.rating.toFixed(1)+'</span>':''}</div><div class="mv-meta">${esc(metaParts.join(' \u00B7 '))}</div><div class="chips">${chips}</div></div>`;
    }).join('');
    return `<div class="card"><div class="top"><div class="title">${esc(cinema)}</div><div class="meta">${sts.length} sesiones \u00B7 ${Object.keys(byMovie).length} peliculas</div></div><div class="sessions">${movieGroups}</div></div>`;
  }).join('');
}

function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
render();
</script>
