<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guía del Ocio Madrid — Cartelera y Conciertos</title>
<style>
  :root {
    --bg: #0f0f0f;
    --card: #1a1a2e;
    --accent: #e94560;
    --text: #eee;
    --muted: #888;
    --border: #2a2a3e;
    --gold: #f5c518;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    padding: 1.5rem 2rem;
    border-bottom: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }
  header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; }
  header h1 span { color: var(--accent); }
  .controls { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
  .controls label { font-size: 0.85rem; color: var(--muted); }
  .controls input[type="date"],
  .controls select {
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 0.4rem 0.6rem; font-size: 0.9rem;
  }
  .search-bar {
    display: flex; justify-content: center; padding: 1rem 2rem 0;
  }
  .search-bar input {
    width: 100%; max-width: 500px; padding: 0.6rem 1rem; padding-left: 2.4rem;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--card); color: var(--text); font-size: 0.95rem;
    outline: none; transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--muted); }
  .search-wrapper { position: relative; width: 100%; max-width: 500px; }
  .search-wrapper::before {
    content: '\1F50D'; position: absolute; left: 0.7rem; top: 50%;
    transform: translateY(-50%); font-size: 0.9rem; pointer-events: none;
  }
  .tabs { display: flex; gap: 0; margin: 1.5rem 2rem 0; }
  .tab {
    padding: 0.6rem 1.4rem; background: var(--card);
    border: 1px solid var(--border); border-bottom: none;
    cursor: pointer; font-size: 0.9rem; color: var(--muted);
    border-radius: 8px 8px 0 0; transition: all 0.2s;
  }
  .tab.active {
    background: var(--bg); color: var(--text);
    border-color: var(--accent); border-bottom-color: var(--bg);
  }
  .content { padding: 1.5rem 2rem; }
  .stats { display: flex; gap: 1.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .stat-box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.8rem 1.2rem; min-width: 120px;
  }
  .stat-box .num { font-size: 1.8rem; font-weight: 700; color: var(--accent); }
  .stat-box .label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .movies-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1.2rem;
  }
  .movie-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }
  .movie-card:hover { transform: translateY(-3px); border-color: var(--accent); }
  .movie-card .top { display: flex; gap: 1rem; padding: 1rem; }
  .movie-card .poster {
    width: 100px; height: 150px; border-radius: 6px;
    object-fit: cover; background: var(--border); flex-shrink: 0;
  }
  .movie-card .poster-placeholder {
    width: 100px; height: 150px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; position: relative; overflow: hidden;
    background: var(--border); color: var(--muted);
    font-size: 0.7rem; text-align: center; padding: 0.5rem;
    font-weight: 600; line-height: 1.3;
  }
  /* YouTube thumbnail poster */
  .yt-poster {
    width: 100px; height: 150px; border-radius: 6px;
    position: relative; overflow: hidden; flex-shrink: 0;
    cursor: pointer; background: var(--border);
  }
  .yt-poster img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.3s, filter 0.3s;
  }
  .yt-poster:hover img { transform: scale(1.05); filter: brightness(0.7); }
  .yt-poster .play-btn {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 32px; height: 32px; background: rgba(229,69,96,0.9);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.3s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .yt-poster:hover .play-btn { opacity: 1; }
  .yt-poster .play-btn::after {
    content: ''; width: 0; height: 0;
    border-style: solid; border-width: 6px 0 6px 11px;
    border-color: transparent transparent transparent #fff;
    margin-left: 2px;
  }
  /* Trailer modal */
  .trailer-modal {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.92); display: none;
    align-items: center; justify-content: center;
    padding: 1rem;
  }
  .trailer-modal.active { display: flex; }
  .trailer-modal .modal-content {
    position: relative; width: 100%; max-width: 800px;
    aspect-ratio: 16/9; border-radius: 10px; overflow: hidden;
    box-shadow: 0 4px 30px rgba(0,0,0,0.5);
  }
  .trailer-modal iframe {
    width: 100%; height: 100%; border: none;
  }
  .trailer-modal .close-btn {
    position: absolute; top: -36px; right: 0;
    background: none; border: none; color: #fff;
    font-size: 1.6rem; cursor: pointer; padding: 0.2rem 0.5rem;
    opacity: 0.7; transition: opacity 0.2s;
  }
  .trailer-modal .close-btn:hover { opacity: 1; }
  /* Genre-based animated poster styles */
  .gen-poster {
    width: 100px; height: 150px; border-radius: 6px;
    position: relative; overflow: hidden; flex-shrink: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
    padding: 0.4rem; text-align: center;
  }
  .gen-poster .gp-title {
    font-size: 0.55rem; font-weight: 700; color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8); z-index: 2;
    line-height: 1.2; max-height: 3rem; overflow: hidden;
    letter-spacing: 0.3px; text-transform: uppercase;
  }
  .gen-poster .gp-genre {
    font-size: 0.45rem; color: rgba(255,255,255,0.7);
    text-transform: uppercase; letter-spacing: 1px; z-index: 2;
    margin-bottom: 0.2rem;
  }
  .gen-poster .gp-icon {
    font-size: 1.8rem; z-index: 2; margin-bottom: 0.3rem;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
  }
  .gen-poster::before {
    content: ''; position: absolute; inset: 0; z-index: 1;
    background: inherit; opacity: 0.15;
  }
  /* Animated grain overlay */
  .gen-poster::after {
    content: ''; position: absolute; inset: -50%; z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
    background-size: 128px 128px;
    animation: grain 4s steps(8) infinite;
    pointer-events: none;
  }
  @keyframes grain {
    0%, 100% { transform: translate(0, 0); }
    10% { transform: translate(-5%, -5%); }
    30% { transform: translate(3%, -8%); }
    50% { transform: translate(-3%, 5%); }
    70% { transform: translate(7%, 2%); }
    90% { transform: translate(-2%, 4%); }
  }
  /* Floating particles for animated genres */
  .gen-poster .gp-particles {
    position: absolute; inset: 0; z-index: 1; overflow: hidden;
  }
  .gen-poster .gp-particles span {
    position: absolute; border-radius: 50%; opacity: 0.4;
    animation: float-up 4s ease-in infinite;
  }
  @keyframes float-up {
    0% { transform: translateY(100%) scale(0); opacity: 0; }
    20% { opacity: 0.6; }
    100% { transform: translateY(-100%) scale(1); opacity: 0; }
  }
  /* Scan line for thriller */
  .gp-scanline {
    position: absolute; left: 0; right: 0; height: 2px;
    background: rgba(255,255,255,0.15); z-index: 2;
    animation: scan 3s linear infinite;
  }
  @keyframes scan {
    0% { top: -2px; } 100% { top: 100%; }
  }
  /* Flicker for terror */
  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.4; }
    97% { opacity: 0.9; }
    98% { opacity: 0.3; }
  }
  /* Shimmer for drama */
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  /* Pulse glow for sci-fi */
  @keyframes pulse-glow {
    0%, 100% { box-shadow: inset 0 0 15px rgba(0,200,255,0.2); }
    50% { box-shadow: inset 0 0 25px rgba(0,200,255,0.5); }
  }
  /* Bounce for animation genre */
  @keyframes bounce-icon {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .movie-card .info { flex: 1; min-width: 0; }
  .movie-card .title { font-size: 1.05rem; font-weight: 600; margin-bottom: 0.3rem; line-height: 1.3; }
  .movie-card .meta { font-size: 0.8rem; color: var(--muted); line-height: 1.5; }
  .movie-card .synopsis {
    font-size: 0.78rem; color: var(--muted); margin-top: 0.4rem; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    cursor: pointer;
  }
  .movie-card .synopsis.expanded { -webkit-line-clamp: unset; display: block; }
  .movie-card .rating {
    display: inline-flex; align-items: center; gap: 0.25rem;
    color: var(--gold); font-weight: 600; font-size: 0.9rem; margin-top: 0.3rem;
  }
  .movie-card .top { cursor: pointer; }
  .movie-card .showtimes-toggle {
    display: flex; align-items: center; justify-content: space-between;
    border-top: 1px solid var(--border); padding: 0.5rem 1rem;
    cursor: pointer; color: var(--muted); font-size: 0.78rem;
    transition: color 0.2s;
  }
  .movie-card .showtimes-toggle:hover { color: var(--text); }
  .movie-card .showtimes-toggle .arrow {
    transition: transform 0.3s; font-size: 0.7rem;
  }
  .movie-card.expanded .showtimes-toggle .arrow { transform: rotate(180deg); }
  .movie-card .showtimes-section {
    border-top: 1px solid var(--border); padding: 0 1rem;
    max-height: 0; overflow: hidden; transition: max-height 0.3s ease, padding 0.3s ease;
  }
  .movie-card.expanded .showtimes-section { max-height: 2000px; padding: 0.8rem 1rem; }
  .movie-card .cinema-group { margin-bottom: 0.6rem; }
  .movie-card .cinema-group:last-child { margin-bottom: 0; }
  .movie-card .cinema-name {
    font-size: 0.75rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 0.3rem;
  }
  .time-chips { display: flex; flex-wrap: wrap; gap: 0.3rem; }
  .chip {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; padding: 0.2rem 0.5rem;
    font-size: 0.78rem; white-space: nowrap;
  }
  .chip.vose { border-color: #4caf50; color: #81c784; }
  .chip.imax { border-color: #2196f3; color: #64b5f6; }
  .chip.atmos { border-color: #9c27b0; color: #ce93d8; }
  .chip.three-d { border-color: #ff9800; color: #ffb74d; }
  .cinemas-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
  }
  .cinema-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 1rem 1.2rem; cursor: pointer;
    transition: border-color 0.2s, transform 0.2s;
  }
  .cinema-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .cinema-card.no-sessions { opacity: 0.5; cursor: default; }
  .cinema-card.no-sessions:hover { border-color: var(--border); transform: none; }
  .cinema-card h3 { font-size: 1rem; margin-bottom: 0.3rem; }
  .cinema-card .addr { font-size: 0.8rem; color: var(--muted); }
  .cinema-card .movie-count { font-size: 0.75rem; color: var(--accent); margin-top: 0.4rem; }
  .cinema-card.no-sessions .movie-count { color: var(--muted); }
  .loading { text-align: center; padding: 3rem; color: var(--muted); font-size: 1.1rem; }
  .empty { text-align: center; padding: 3rem; color: var(--muted); }
  .filter-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .filter-btn {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 0.35rem 0.9rem;
    color: var(--muted); cursor: pointer; font-size: 0.8rem; transition: all 0.2s;
  }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  /* Concert venue groups */
  .venue-group {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; margin-bottom: 1.5rem;
  }
  .venue-header {
    display: flex; align-items: center; gap: 1rem;
    padding: 1rem 1.2rem; cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.2s;
  }
  .venue-header:hover { background: rgba(156,39,176,0.08); }
  .venue-header .venue-icon {
    width: 48px; height: 48px; border-radius: 8px;
    background: linear-gradient(135deg, #2a1a3e, #4a2a6e);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem; flex-shrink: 0;
  }
  .venue-header .venue-info { flex: 1; min-width: 0; }
  .venue-header .venue-title { font-size: 1.1rem; font-weight: 700; color: #ce93d8; }
  .venue-header .venue-address { font-size: 0.8rem; color: var(--muted); margin-top: 0.15rem; }
  .venue-header .venue-count {
    background: var(--accent); color: #fff; border-radius: 12px;
    padding: 0.2rem 0.7rem; font-size: 0.8rem; font-weight: 600; flex-shrink: 0;
  }
  .venue-events { padding: 0; }
  .venue-event {
    display: flex; align-items: center; gap: 1rem;
    padding: 0.8rem 1.2rem;
    border-bottom: 1px solid var(--border);
    transition: background 0.2s;
  }
  .venue-event:last-child { border-bottom: none; }
  .venue-event:hover { background: rgba(156,39,176,0.05); }
  .venue-event .event-img {
    width: 56px; height: 56px; border-radius: 6px;
    object-fit: cover; background: var(--border); flex-shrink: 0;
  }
  .venue-event .event-placeholder {
    width: 56px; height: 56px; border-radius: 6px;
    background: linear-gradient(135deg, #2a1a3e, #4a2a6e);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; flex-shrink: 0;
  }
  .venue-event .event-info { flex: 1; min-width: 0; }
  .venue-event .event-title { font-size: 0.95rem; font-weight: 600; line-height: 1.3; }
  .venue-event .event-artist { font-size: 0.82rem; color: #ce93d8; }
  .venue-event .event-meta {
    display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.3rem; font-size: 0.75rem;
  }
  .venue-event .event-meta .tag {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; padding: 0.1rem 0.45rem;
  }
  .tag.date-tag { border-color: #9c27b0; color: #ce93d8; }
  .tag.price-tag { border-color: #4caf50; color: #81c784; }
  .tag.genre-tag { border-color: #2196f3; color: #64b5f6; }
  .venue-event .ticket-btn {
    color: #ce93d8; text-decoration: none; font-size: 0.78rem;
    border: 1px solid #9c27b0; border-radius: 6px;
    padding: 0.3rem 0.7rem; flex-shrink: 0; transition: background 0.2s;
  }
  .venue-event .ticket-btn:hover { background: rgba(156,39,176,0.2); }
  /* Date filter pills for concerts */
  .date-filters { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .date-pill {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 0.35rem 0.9rem;
    color: var(--muted); cursor: pointer; font-size: 0.82rem; transition: all 0.2s;
    text-transform: capitalize;
  }
  .date-pill.active { background: #9c27b0; border-color: #9c27b0; color: #fff; }
  .date-pill:hover { border-color: #9c27b0; color: #ce93d8; }
  @media (max-width: 600px) {
    .movies-grid { grid-template-columns: 1fr; }
    header { padding: 1rem; }
    .content { padding: 1rem; }
    .search-bar { padding: 1rem 1rem 0; }
    .tabs { margin: 1rem 1rem 0; }
  }
</style>
</head>
<body>

<header>
  <h1><span>Guía</span>Madrid</h1>
  <div class="controls">
    <label>Fecha:</label>
    <input type="date" id="datePicker" value="2026-03-28">
    <select id="cinemaFilter">
      <option value="">Todos los cines</option>
    </select>
  </div>
</header>

<div class="search-bar">
  <div class="search-wrapper">
    <input type="text" id="searchInput" placeholder="Buscar película o cine..." autocomplete="off">
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="peliculas">Películas</div>
  <div class="tab" data-tab="conciertos">Conciertos</div>
  <div class="tab" data-tab="cines">Cines</div>
</div>

<!-- Trailer modal -->
<div class="trailer-modal" id="trailerModal" onclick="closeTrailer(event)">
  <div class="modal-content">
    <button class="close-btn" onclick="closeTrailer()">&times;</button>
    <iframe id="trailerFrame" allowfullscreen allow="autoplay"></iframe>
  </div>
</div>

<div class="content">
  <div id="peliculas-tab">
    <div class="stats" id="stats"></div>
    <div class="filter-bar" id="lang-filters"></div>
    <div id="movies-container" class="loading">Cargando cartelera...</div>
  </div>
  <div id="conciertos-tab" style="display:none">
    <div class="stats" id="concert-stats"></div>
    <div class="date-filters" id="concert-date-filters"></div>
    <div id="concerts-container" class="loading">Cargando conciertos...</div>
  </div>
  <div id="cines-tab" style="display:none">
    <div id="cinemas-container" class="loading">Cargando cines...</div>
  </div>
</div>

<script>
// Embedded data
const EMBEDDED_MOVIES = [{"id": 1, "title": "Abuela tremenda", "director": "Ana Vázquez", "genre": "Comedia", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/90/00/90008baacf8ffffff15f0c77cdb46b8e.jpg", "rating": null, "synopsis": "Toñi no es una abuela común: es un torbellino impredecible y alegre que siempre se mete en líos. Su hija Daniela intenta mantener el orden, mientras su nieta Alexia adora a su divertida abuela. Cuando Daniela lleva a Alexia a un retiro rural organizado por su empresa, Toñi aparece sin avisar con su caravana, decidida a pasar tiempo con su nieta y revolucionar el ambiente.Con su energía desbordante, Toñi trastoca la rutina, el trabajo de Daniela y, sin proponérselo, también ayuda a que todo encuentre su lugar.", "sensacine_id": "1000028247", "tmdb_id": null}, {"id": 2, "title": "Altas capacidades", "director": "Víctor García León", "genre": "Comedia dramática", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/44/0d/440d7b47444af051761a619970d13a3b.jpg", "rating": null, "synopsis": "Alicia y Gonzalo, un matrimonio clase media, ven abrirse ante ellos una ocasión inesperada: conseguir plaza para su hijo Fer en un exclusivo centro educativo privado y no religioso. La posibilidad de acceder a ese entorno selecto les deslumbra, porque no solo promete una mejor formación para el niño, sino también la entrada a un círculo privilegiado de contactos, oportunidades profesionales y una posición social más ventajosa. Aunque aseguran que todo lo hacen pensando en el bienestar de su hijo, el movimiento también despierta ambiciones personales largamente contenidas. A medida que se adentran en ese nuevo mundo de apariencias y estatus, comienzan a tensionarse sus valores, sus inseguridades y sus convicciones éticas. Entre el deseo de ascenso social y la fidelidad a sus propios principios, la pareja se enfrenta a decisiones que pondrán a prueba su coherencia. En ese choque entre aspiración y conciencia, terminarán url": "https://es.web.img3.acsta.net/img/1e/0a/1e0aff63b4c1fa267e451bf3174a4d5a.jpg", "rating": null, "synopsis": "En la tercera entrega de la saga Avatar, se introduce al Pueblo de las Cenizas, un nuevo clan Na'vi con una visión más agresiva que el resto de pueblos del mundo. A diferencia de los clanes vistos anteriormente, estos Na'vi no dudan en recurrir a la violencia para conseguir sus fines, incluso si eso significa enfrentarse a otros clanes. Con esta nueva amenaza, Pandora se convierte en un territorio aún más inestable, donde los conflictos internos ponen en peligro el equilibrio del planeta y obligan a replantear la lucha por su supervivencia.", "sensacine_id": "187247", "tmdb_id": null}, {"id": 6, "title": "Bluey en cines: Colección ¡A jugar con los amigos!", "director": "Joe Brumm", "genre": "Animación", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/ac/10/ac106b79b1da191212b3692cdf8b978d.jpg", "rating": null, "synopsis": "Una experiencia cinematográfica de una hora de duración que incluye ocho episodios de las tres temporadas de la serie Bluey, todos ellos dedicados al juego, la imaginación, la amistad y la familia. La recopilación reúne algunos de los juegos más queridos de Bluey, como Shadowlands y Octopus, al tiempo que destaca momentos especiales de amistad en episodios como Circus y Slide, y ofrece mucha alegría, risas y diversión en la gran pantalla para públicos de todas las edades.", "sensacine_id": "1000033909", "tmdb_id": null}, {"id": 7, "title": "Candyman (El dominio de la mente)", "director": "Bernard Rose", "genre": "Terror, Drama, Suspense", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/medias/nmedia/18/95/58/07/20415915.jpg", "rating": null, "synopsis": "Helen Lyle, una estudiante de la Universidad de Chicago que realiza una investigación académica sobre las leyendas locales en los bajos fondos de Illinois, se siente especialmente atraída por el mito de Candyman, el espíritu inmortal de un esc ne_id": "312913", "tmdb_id": null}, {"id": 12, "title": "EPiC: Elvis Presley in Concert", "director": "Baz Luhrmann", "genre": "Documental, Música", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/10/d8/10d898f6be22dbd1a573aeaed8ddfbfd.jpg", "rating": null, "synopsis": "Película-concierto que ofrece una experiencia única al mezclar imágenes inéditas y restauradas de Elvis Presley, con actuaciones en vivo, mostrando al cantante no solo cantando, sino contando su propia historia de manera íntima y personal. A través de este material, seleccionado y remasterizado, se descubren facetas desconocidas de su vida, de su trayectoria musical y de su conexión con el público, acercando al cantante a los espectadores, haciendo que Elvis cobre vida con emocionalidad, nostalgia y la energía que lo convirtió en un icono mundial.", "sensacine_id": "1000018720", "tmdb_id": null}, {"id": 13, "title": "El agente secreto", "director": "Kleber Mendonça Filho", "genre": "Crimen, Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/77/cc/77cc0442de426a9afa5373651bdc66f7.jpg", "rating": null, "synopsis": "En un Brasil marcado por la represión de la dictadura militar, Marcelo, un hombre de cuarenta años con un pasado lleno de sombras, llega a Recife con la esperanza de empezar de nuevo y reencontrarse con su hijo. Pero su intento de redención se ve amenazado cuando descubre que es vigilado por las fuerzas del régimen. Perseguido y con su vida en peligro, Marcelo deberá enfrentarse a viejas culpas y tomar decisiones imposibles mientras las amenazas se ciernen cada vez más cerca. En una ciudad llena de tensión y miedo, el pasado no ha terminado con él.", "sensacine_id": "1000009761", "tmdb_id": null}, {"id": 14, "title": "El arquitecto", "director": "Stéphane Demoustier", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/54/13/5413dfef1fb0916fdce12ae29d411377.jpg", "rating": null, "synopsis": "En 1983, el gobierno francés lanza el mayor concurso de arquitectura de la historia para coronar el distrito de La Défense en París. Contra todo pronóstico, gana Johan Otto von Spreckelsen, un arquitecto danés apenas conocido. Con solo cuatro obras construidas, su casa y tres capillas, “Spreck” pasa de la sombra al centro de atención mundial. Ahora deberá liderar la construcción del majestuoso Arco de la Defensa, un proyecto monumental cargado de implicaciones políticas, económicas y simbólicas.", "sensacine_id": "325267", "tmdb_id": null}, {"id": 15, "title": "El fantasma de mi mujer", "director": "Maria Ripoll", "genre": "Comedia", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/2d/5b/2d5b6d2f81a7f5135352dccc20b5f6f1.jpg", "rating": null, "synopsis": "Fernando vive un matrimonio tranquilo con María mientras que tiene un lío con Julia. Una noche recibe una llamada de su amante, diciéndole que acaba de atropellar a su mujer de forma accidental, que no quería matarla pero necesita su ayuda para deshacerse del cadáver. Desbordado por la situación en la que esta envuelto, Fernando decide fingir que su mujer lo ha abandonado hasta que recibe una llamada de la que cree que es María. Desde entonces, Fernando cree escuchar y ver a su mujer por todas partes.", "sensacine_id": "1000036266", "tmdb_id": null}, {"id": 16, "title": "El mago del Kremlin", "director": "Olivier Assayas", "genre": "Suspense", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/79/16/791661a754fe3013e3f853b9a6ea6ec2.jpg", "rating": null, "synopsis": "En el turbulento contexto postsoviético de los años 90, un joven artista y productor de televisión comienza a ascender gracias a su talento y habilidad para conectar con las élites. Su ingenio le abre las puertas al círculo más cercano de un agente del KGB con gran ambición política, lo que le convierte en testigo privilegiado del nacimiento de una nueva Rusia.Desde dentro del poder, ambos moldean el futuro del país, en un juego donde los límites entre la verdad y la mentira se desdibujan peligrosamente.", "sensacine_id": "1000005026", "tmdb_id": 1291659}, {"id": 17, "title": "El mal", "director": "Juanma Bajo Ulloa", "genre": "Suspense, Drama", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/9b/dd/9bdd9803bdcf891db50f563493c7740b.jpg", "rating": null, "synopsis": "La película es una intrigante exploración del ser humano y su insaciable necesidad de reconocimiento, mientras enfrenta la incapacidad de aceptar su propio lado oscuro. A través de una narrativa de suspense, la película mantiene al espectador en un constante estado de anticipación, sugiriendo que algo inquietante está por suceder, pero dejando en el aire la incógnita de cómo y cuándo se manifestará. La historia no solo busca provocar inquietud, sino que también invita al público a reflexionar sobre sus propias certezas y limitaciones.", "sensacine_id": "1000011447", "tmdb_id": null}, {"id": 18, "title": "El testamento de Ann Lee", "director": "Mona Fastvold", "genre": "Drama, Histórico, Biopic, Música", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/75/ac/75acd2dd2f513294d8a63e842357a02f.jpg", "rating": null, "synopsis": "La historia se centra en Ann Lee, líder religiosa y fundadora del Movimiento Shaker a finales de la década de 1770, que levantó una de las comunidades utópicas más influyentes en la historia de Estados Unidos. Venerada por sus seguidores como una figura divina, considerada incluso el Jesucristo femenino, Ann inspiró una forma de devoción única basada en la música, la danza y la vida comunitaria.El relato explora su visión espiritual, el fervor de sus fieles y cómo sus ideales marcaron un movimiento que buscaba pureza, igualdad y trascendencia en plena era colonial.", "sensacine_id": "1000016982", "tmdb_id": null}, {"id": 19, "title": "El último vikingo", "director": "Anders Thomas Jensen", "genre": "Comedia, Drama, Suspense", "duration_min": null, "poster_url": que le supera en edad pero de la que se enamora perdidamente. La diferencia de edad y los miedos particulares de Bastien no estropearan lo que evidentamente es un vínculo especial. Mientras el adolescente intenta superar estos miedos y ganarse el corazón de esta chica, se hará una exploración de su sexualidad y de una inquetante leyenda sobre un fantasma que reside en el lago.", "sensacine_id": "289988", "tmdb_id": null}, {"id": 22, "title": "Greenland 2", "director": "Ric Roman Waugh", "genre": "Suspense, Acción", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/31/fb/31fb4fd126f37a6fcb48cf22d8584818.jpg", "rating": null, "synopsis": "Después de sobrevivir cinco años en un búnker tras el impacto de un cometa, Jeff Garrity, su mujer Allison y su hijo Nathan deciden abandonar su refugio en busca de un lugar habitable en Europa. Su travesía los lleva a un mundo transformado en un infierno por desastres naturales y supervivientes poco amigables, y cada decisión puede marcar la diferencia entre la vida y la muerte. En el camino, deberán aprender a confiar el uno en el otro y a adaptarse a un entorno que ha cambiado para siempre, poniendo a prueba su ingenio, coraje y unidad familiar.", "sensacine_id": "293629", "tmdb_id": null}, {"id": 23, "title": "Guardianes de la Noche (Kimetsu no Yaiba): La Fortaleza Infinita - Parte 1", "director": "Haruo Sotozaki", "genre": "Animación", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/af/0b/af0be406b528e2ebc5ee0fa95c5e2c69.jpg", "rating": null, "synopsis": "Primera parte de la adaptación de los los 46 números del manga Demon Slayer dedicados a la Fortaleza Infinita. En esta ocasión, la situación será ligeramente diferente a lo que sucedió en las temporadas tres y cuatro. En esas temporadas, se estrenaron películas en el cine que solo servían como introducción a la nueva historia. Después de esto, solo quedará el Arco de la Cuenta Regresiva al Amanecer, que consta de 21 números en el manga. Tanto Crunchyroll como Sony Pictures Entertainment se encargarán de llevar estas historias tanto al cine como a la plataforma de streaming. Aunque aún no se han anunciado fechas de estreno.", "sensacine_id": "1000006302", "tmdb_id": null}, {"id": 24, "title": "Hamnet", "director": "Chloé Zhao", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/07/8a/078a4f7d4dce42afa5d24bb304747b3a.jpg", "rating": null, "synopsis": "La vida de Agnes, la esposa de William Shakespeare, se ve marcada por el dolor tras la muerte de su hijo Hamnet. En un retrato íntimo y profundamente humano, se muestra su lucha por sobrellevar la pérdida mientras protege a su familia y busca sentido en medio del duelo.La historia revela cómo este acontecimiento trágico se convierte en telón de fondo para la creación de Hamlet, una de las obras más emblemáticas de Shakespeare. Con sensibilidad y fuerza emocional, la narración mezcla amor, maternidad y arte, iluminando la figura de Agnes como pilar invisible en la vida del dramaturgo.", "sensacine_id": "315003", "tmdb_id": null}, {"id": 25, "title": "Hannah Montana - La película", "director": "Peter Chelsom", "genre": "Comedia, Comedia musical", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/medias/nmedia/18/68/83/31/19062891.jpg", "rating": null, "synopsis": "Miley Stewart tiene que compaginar el colegio, sus amigos y su vida secreta como la estrella del pop Hannah Montana. Su popularidad cada vez es mayor y comienza a invadir todo su mundo personal, siendo cada vez menos Miley y más Hannah, pero ella parece aceptarlo. Su padre decide enviarla a traición a su pueblo rural Crowley Corners, en Tennessee, para que conecte con su auténtico yo, algo que rechaza en un principio pero que no tiene más remedio que acabar aceptando. Allí se reencontrará con su abuela, encontrará el amor y será sólo Miley, aunque puede que tarde o temprano necesite la ayuda de Hannah.Película musical original de Disney Channel dirigida por Peter Chelsom (Serendipity) y protagonizada por Miley Cyrus (La última canción), Billy Ray Cyrus (El súper canguro), Emily Osment (Spy Kids 2: La isla de los sueños perdidos) y Lucas Till (X-Men: Apocalipsis), entre otros.", "sensacine_id": "136571", "tmdb_id": null}, {"id": 26, "title": "Hoppers", "director": "Daniel Chong", "genre": "Animación, Aventura, Comedia", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/0f/d8/0fd8f3c56fa2f4bbd9cdf169fa88f569.jpg", "rating": null, "synopsis": "Mabel, una joven con una habilidad extraordinaria, puede transferir su mente a un castor robot para infiltrarse en el reino animal. Su misión: descubrir los planes de un ambicioso promotor inmobiliario que amenaza con destruir el hábitat natural. En su aventura, Mabel entabla una inesperada amistad con el carismático y sabio Rey Jorge, un castor que lidera a los suyos con nobleza. Juntos, unirán a los animales en una lucha por defender su hogar. Esta historia está llena de humor, ingenio y corazón para la amistad.", "sensacine_id": "1000009065", "tmdb_id": 1327819}, {"id": 27, "title": "Kampf um Rom I", "director": "Robert Siodmak | Andrew Marton | Sergiu Nicolaescu", "genre": "Aventura, Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/pictures/22/05/11/16/28/5926417.jpg", "rating": null, "synopsis": "", "sensacine_id": "182003", "tmdb_id": null}, {"id": 28, "title": "La Boda", "director": "Pedro Cenjor", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/98/63/9863cf2bbbfb92dd9db97cb036342ec5.jpg", "rating": null, "synopsis": "Felisa vive con su madre y sobrevive gracias a su pensión. Una clienta habitual, Adelaida, insiste en que se case con su hijo Sebastián, a pesar de que él no está convencido. Finalmente, ambos aceptan el acuerdo y emprenden juntos un viaje de luna de miel a Motril. Lo que comienza como una unión por conveniencia se transforma poco a poco en una experiencia reveladora y nueva para ambos, donde aparecen tensiones, afectos inesperados y la posibilidad de cambiar sus vidas más allá de lo que habían pactado.", "sensacine_id": "1000026174", "tmdb_id": null}, {"id": 29, "title": "La Fiera", "director": "Salvador Calvo", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/d6/c5/d6c53c32281f0b7facfc1d6619d1b87c.jpg", "rating": null, "synopsis": "Un grupo de tres amigos, Carlos, Darío y Armando, apasionados por los deportes de riesgo, descubren la sensación más cercana a desafiar a la gravedad: el salto BASE con traje de alas. Los tres lo prueban y se enamoran de la sensación que les produce.Se cuenta su aventura real desde dentro, mostrando el vértigo que produce, los miedos que surgen con el riesgo y la euforia de los que se enfrentan al vacío. El grupo de amigos muestra una historia sobre peligros y compañerismo, que acaba en un viaje brutal y lleno de emociones donde el mayor desafío no está en el aire sino en uno mismo.", "sensacine_id": "1000036246", "tmdb_id": null}, {"id": 30, "title": "La Virgen de la tosquera", "director": "Laura Casabé", "genre": "Suspense", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/9a/a1/9aa1121582156ed994666933df5f0835.jpg", "rating": null, "synopsis": "Natalia, Mariela y Josefina son tres inseparables amigas que han crecido juntas en las afueras de Buenos Aires. Desde niñas, han compartido sueños, risas y confidencias, y su amistad se ha fortalecido con el tiempo. Cada una, a su manera, ha desarrollado un amor profundo y platónico hacia Diego, su amigo de la infancia. Diego, con su carisma y amabilidad, se ha convertido en el centro de sus pensamientos y deseos. El verano de 2001 llega cargado de incertidumbre y tensión. La crisis económica y social que estalla en el país sacude los cimientos de sus vidas y de su entorno. En medio de este caos, aparece Silvia, una mujer mayor y más experimentada, cuya presencia cautiva a Diego de manera inmediata. Silvia, con su aire de misterio y sofisticación, despierta en Diego una atracción que las tres amigas nunca habían visto antes. Decidida a recuperar el corazón de Diego, Natalia recurre a su abuela Rita, conocida en el vecindario por sus conocimientos en el arte de los hechizos y la magia negra. Rita, comprendiendo la intensidad de los sentimientos de su nieta, decide ayudarla. Juntas, se adentran en un mundo desconocido y peligroso, lleno de rituales y encantamientos. A medida que Natalia se sumerge en este oscuro universo, comienza a descubrir el poder y las consecuencias de la magia. La búsqueda para reconquistar a Diego no solo la desafía a nivel emocional, sino que también la enfrenta a sus propios miedos y límites. La conexión con sus amigas Mariela y Josefina se pone a prueba, y el destino de su amor por Diego se vuelve incierto.", "sensacine_id": "1000017044", "tmdb_id": null}, {"id": 31, "title": "La asistenta", "director": "Paul Feig", "genre": "Suspense", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/71/83/7183a7a55e47f98332d9ef93b5518384.jpg", "rating": null, "synopsis": "Basada en la novela de Freida McFadden y adaptada por Rebecca Sonnenshine, la película sigue a Millie (Sydney Sweeney), una joven con problemas que encuentra alivio al empezar de cero como empleada doméstica para Nina (Amanda Seyfried) y Andrew (Luke Sklenar), una pareja adinerada de alta sociedad. Sin embargo, pronto descubre que los oscuros secretos que esconden sus jefes son mucho más peligrosos que los suyos propios. A medida que su vida se entrelaza con la de la familia, Millie se enfrenta a verdades inquietantes que pondrán su seguridad y cordura al límite.", "sensacine_id": "317403", "tmdb_id": null}, {"id": 32, "title": "La hija pequeña", "director": "Hafsia Herzi", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/76/66/76661f155b1fa03fd3ebcdbf9e4158bd.jpg", "rating": null, "synopsis": "Fátima, de 17 años, es la pequeña de tres hermanas y crece en una familia franco-argelina unida y amorosa en los suburbios. Buena estudiante, consigue entrar en la Universidad de París, donde comienza una nueva etapa marcada por la libertad y el descubrimiento personal. Al alejarse de su entorno familiar, explora nuevas amistades, relaciones y formas de vivir, mientras navega entre dos mundos culturales que a menudo chocan. Fátima debe enfrentarse a tensiones internas y externas al intentar construir una identidad propia sin renunciar a sus raíces.", "sensacine_id": "303094", "tmdb_id": null}, {"id": 33, "title": "La tarta del Presidente", "director": "Hasan Hadi", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/66/57/66579f98069add631ed33500ac48baec.jpg", "rating": null, "synopsis": "En el Iraq de Sadam Husein, donde la vida cotidiana está marcada por la escasez y el miedo, Lamia, una niña de nueve años, se enfrenta a una tarea imposible: conseguir los ingredientes para una tarta de cumpleaños obligatoria en honor al dictador. Bajo las duras sanciones internacionales y la vigilancia constante del régimen, Lamia recorre una ciudad desolada, usando su ingenio y valentía para cumplir con el mandato. Cada paso la acerca al riesgo de ser castigada con prisión o incluso la muerte.", "sensacine_id": "1000023006", "tmdb_id": null}, {"id": 34, "title": "La última cena", "director": "Mauro Borrelli", "genre": "Drama, Histórico", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/11/ba/11bac1dde2b54c9b5eeefa7bf096a44d.jpg", "rating": null, "synopsis": "En una Jerusalén asfixiada por el polvo y la opresión, Jesús de Nazaret se reúne con sus doce apóstoles para celebrar lo que parece ser una cena de despedida. El ambiente exterior es eléctrico; la ciudad es un polvorín a punto de estallar debido a la brutal vigilancia de las legiones romanas y el descontento de un pueblo que clama por un líder político y militar. Sin embargo, el verdadero drama se desarrolla tras las puertas cerradas del cenáculo. A medida que el vino circula, la hermandad de los discípulos comienza a agrietarse. Lo que antes eran susurros y dudas teológicas se convierten en enfrentamientos abiertos:", "sensacine_id": "1000014776", "tmdb_id": null}, {"id": 35, "title": "Las locas del obelisco", "director": "Pablo Moreno", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/80/88/8088aa9778341bf51b01adbbfd41fa83.jpg", "rating": null, "synopsis": "A finales del siglo XIX, en un Madrid en plena transformación social y urbana, la vida de varias mujeres de diferentes clases sociales se entrelaza trágicamente en una ciudad marcada por la desigualdad, la hipocresía y la miseria moral. Teresa y Candela, dos hermanas del ámbito rural, llegan a la capital buscando una vida mejor, pero pronto se enfrentan a la crudeza de una ciudad que devora a las jóvenes sin recursos. En paralelo, María Ana Allsopp, una joven aristócrata mexicana afincada en Madrid, experimenta un profundo despertar de conciencia al confrontar el sufrimiento de las mujeres marginadas. Mientras la violencia, el abuso y la indiferencia amenazan con destruir las vidas de quienes luchan por salir adelante, la esperanza renace en la voluntad de unas pocas personas dispuestas a desafiar las normas establecidas. Inspirada por el sacerdote Francisco de Asís Méndez, María Ana decidirá arriesgar su vida cómoda y su estatus para dar voz y refugio a las que nunca la han tenido.", "sensacine_id": "1000039950", "tmdb_id": null}, {"id": 36, "title": "Los domingos", "director": "Alauda Ruiz de Azúa", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/9e/4a/9e4a3af5d3e43447c08db19eaf6fe4e3.jpg", "rating": null, "synopsis": "Ainara es una joven de 17 años brillante y uy idealista que, en lugar de elegir una carrera universitaria como espera su familia, decide entregarse a la vida religiosa, convirtiéndose en monja de clausura. Su inesperada decisión hace que los cimientos familiares se sacudan, generando sorpresa, conflictos y un profundo cuestionamiento sobre la fe, la libertad y el destino. A medida que cada miembro afronta la noticia, la familia se enfrenta a una prueba de fuego que cambiará sus vidas para siempre.", "sensacine_id": "1000020167", "tmdb_id": null}, {"id": 37, "title": "Maigret y la muerte del embajador", "director": "Pascal Bonitzer", "genre": "Crimen", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/50/22/5022e65123f3c2f3c35f8ceac056d366.png", "rating": null, "synopsis": "comisario Maigret es convocado de urgencia al Quai d’Orsay tras el asesinato de Monsieur Berthier-Lagès, un exembajador de prestigio cuya carrera diplomática marcó varias décadas. Desde el primer momento, Maigret se ve ante un caso lleno de secretos y emociones reprimidas: descubre que Berthier-Lagès mantenía desde hacía cincuenta años una correspondencia amorosa con la princesa de Vuynes, cuyo esposo ha fallecido misteriosamente poco antes. Mientras interroga a los miembros de ambas familias, que ocultan celosamente sus resentimientos y rencores, y trata de descifrar el extraño silencio de la fiel y enigmática criada del diplomático, Maigret se enfrenta a una serie de giros inesperados. Cada pista abre nuevas incógnitas: cartas escondidas, alianzas familiares secretas y pasiones ocultas que revelan que nada es lo que parece.", "sensacine_id": "325655", "tmdb_id": null}, {"id": 38, "title": "Marty Supreme", "director": "Josh Safdie", "genre": "Drama, Biopic", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/a8/e5/a8e58393b089b9ae573a06bf3e3068c9.jpg", "rating": null, "synopsis": "Marty Reisman, un carismático buscavidas de Nueva York, descubrió su don para el ping pong en los clubes clandestinos de Manhattan, donde jugaba por dinero. Su estilo llamativo y su audaz juego ofensivo lo llevaron a lo más alto del tenis de mesa, ganando 22 títulos importantes, incluidos dos campeonatos nacionales. Icono del espectáculo y la destreza, se convirtió, a los 67 años, en el campeón más veterano en un torneo nacional de deportes de raqueta. Su vida, entre apuestas, desafíos y gloria, es el retrato de un genio rebelde del deporte.", "sensacine_id": "1000007317", "tmdb_id": null}, {"id": 39, "title": "No hay otra opción", "director": "Park Chan-Wook", "genre": "Comedia, Suspense, Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/99/6f/996fc736b397f482daa9eedbf5f41970.jpg", "rating": null, "synopsis": "Man-su, un especialista en la fabricación de papel con 25 años de experiencia, está tan satisfecho con su vida que puede decirse sinceramente a sí mismo: «Lo tengo todo». Mientras pasa felizmente sus días con su esposa Miri, sus dos hijos y sus dos perros, Man-su recibe de repente la noticia de que ha sido despedido de su empresa. Sintiéndose como si le hubieran cortado la cabeza con un hacha, Man-su se compromete a encontrar un nuevo trabajo en los próximos tres meses por el bien de su familia. A pesar de su firme determinación de darle un giro a su vida, Man-su pasa más de un año yendo de una entrevista de trabajo a otra, hasta que finalmente consigue un empleo en una tienda minorista. Se encuentra en peligro de perder la casa que tanto le costó comprar.", "sensacine_id": "1000001960", "tmdb_id": null}, {"id": 40, "title": "Núremberg", "director": "James Vanderbilt", "genre": "Histórico, Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/72/f8/72f8911ca73177c4c0fa4cdc4b476d9d.jpg", "rating": null, "synopsis": "Tras la Segunda Guerra Mundial, durante los históricos juicios de Nuremberg, el psiquiatra estadounidense Douglas Kelley tiene la tarea de evaluar la salud mental de los prisioneros nazis para determinar si son aptos para ser juzgados por crímenes de guerra. En medio de esta responsabilidad, Kelley se enfrenta a Hermann Göring, mano derecha de Hitler, en una intensa batalla de ingenio y manipulación. Mientras Göring intenta mantener su poder, Kelley debe navegar entre la verdad, la justicia y la psicología de uno de los líderes más peligrosos del Tercer Reich.", "sensacine_id": "324466", "tmdb_id": null}, {"id": 41, "title": "Orwell: 2+2=5", "director": "Raoul Peck", "genre": "Documental", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/b5/b8/b5b83af99150bc5c81c391cbd2ca109c.jpg", "rating": null, "synopsis": "Raoul Peck se sumerge de lleno en los últimos meses de vida de George Orwell y en sus obras más visionarias para analizar el origen de conceptos clave como la vigilancia, la verdad manipulada o el control social. A través de una mirada crítica y contemporánea, el documental conecta el pensamiento del autor con los desafíos del presente, desvelando cómo sus advertencias siguen más vigentes que nunca. Una reflexión profunda sobre el poder, la libertad y la fragilidad de la verdad en el mundo actual.", "sensacine_id": "314229", "tmdb_id": null}, {"id": 42, "title": "Pillion", "director": "Harry Lighton", "genre": "Drama, Erótico, Comedia, Romántico", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/a2/05/a205ecea7ee491167d8a2eea56708319.jpg", "rating": null, "synopsis": "Colin, un hombre solitario, ve su vida transformada al conocer a Ray, un carismático líder de moteros. Lo que comienza como una amistad inesperada evoluciona hacia una relación marcada por una dinámica de sumisión que desafía las estructuras rígidas de Colin. A través de esta experiencia intensa y fuera de lo común, Colin confronta sus miedos, se libera de patrones autoimpuestos y experimenta un profundo proceso de autodescubrimiento. La presencia de Ray sacude su rutina y despierta en él una nueva forma de entender el deseo, el poder y la libertad personal.", "sensacine_id": "1000004467", "tmdb_id": null}, {"id": 43, "title": "Proyecto Salvación", "director": "Phil Lord | Christopher Miller", "genre": "Ciencia ficción, Acción, Aventura", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/46/3a/463a0d3860e79b345ecb71c56ae28bfa.jpg", "rating": null, "synopsis": "Un astronauta solitario (Ryan Gosling) despierta de un coma y se da cuenta de que está a millones de kilómetros de su hogar. En el diminuto vehículo en el que vuelve en sí, también hay dos miembros de la tripulación muertos. El astronauta no recuerda ni su misión ni su nombre. Sin embargo, pronto descubre que es la única esperanza para la supervivencia de la humanidad.", "sensacine_id": "282076", "tmdb_id": null}, {"id": 44, "title": "Ruta de escape", "director": "Bart Layton", "genre": "Crimen, Suspense", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/b7/67/b767211a1a618183340db6f1b736c908.jpg", "rating": null, "synopsis": "Un escurridizo ladrón planea su mayor atraco, con la esperanza de que sea el último, cuando se ve obligado a colaborar con una ejecutiva de seguros desilusionada y a enfrentarse a un rival con métodos más peligrosos. A medida que se acerca el golpe multimillonario, un teniente implacable estrecha el cerco, aumentando el riesgo y difuminando la línea entre cazador y presa. Cada uno deberá asumir las consecuencias de sus decisiones, conscientes de que no hay vuelta atrás, mientras la tensión y la traición amenazan con destruir sus planes y su libertad.", "sensacine_id": "319570", "tmdb_id": null}, {"id": 45, "title": "Scream 7", "director": "Kevin Williamson", "genre": "Terror, Suspense", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/f9/57/f957e82b8374af3029d4e7acc0b62229.png", "rating": null, "synopsis": "Cuando un nuevo asesino Ghostface aparece en el tranquilo y relajaddo pueblo donde Sidney Prescott ha intentado reconstruir su vida, sus peores pesadillas vuelven. Todo se vuelve aún más aterrador cuando su hija se convierte en el nuevo objetivo del enmascarado.Obligada a enfrentarse a los traumas que creía enterrados, Sidney deberá enfrentarse a su oscuro pasado y a un enemigo implacable. En una carrera contra el tiempo, madre e hija lucharán por sobrevivir y acabar con la masacre de una vez por todas.", "sensacine_id": "318865", "tmdb_id": null}, {"id": 46, "title": "Shelter: El protector", "director": "Ric Roman Waugh", "genre": "Suspense, Acción", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/5f/7e/5f7eef89c25400a9789a612a9343c970.jpg", "rating": null, "synopsis": "En una isla alejada, un hombre en el exilio salva a una niña de una peligrosa tormenta, generando una peligrosa cadena de acontecimientos que los pone a los dos en peligro. Mientras sus caminos van uniéndose, tiene que protegerla a toda costa, haciendo frente a los enemigos que le persiguen por su pasado. Con persecuciones, enfrentamientos y desafíos complicados, la historia es una lucha por la supervivencia donde la valentía y el sacrificio marcarán la diferencia entre la vida y la muerte para ambos.", "sensacine_id": "1000005744", "tmdb_id": null}, {"id": 47, "title": "Tafiti y sus amigos", "director": "Nina Wels", "genre": "Animación, Familia, Aventura", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/90/a5/90a558c0e47ff39af3eb5bb05cf738db.jpg", "rating": null, "synopsis": "En la magnífica sabana africana acechan muchos peligros, especialmente para una suricata como nuestro héroe Tafiti. Su abuelo Opapa le enseña que el mundo está lleno de riesgos y que es mejor que se mantengan entre ellos. Pero Tafiti no puede seguir este consejo y se apresura a rescatar a Pinsel, un cerdo de orejas de pincel. Entonces, una serpiente venenosa se cuela y muerde a Opapa. La única esperanza de salvación es una rara flor azul que florece al otro lado del desierto. Tafiti promete mantenerse alejado de los demás a partir de ahora, pero eso resulta más difícil de lo que pensaba. Pinsel sigue a Tafiti para saldar su deuda. Juntos, siguiendo el consejo de Opapa, se adentran en el infinito desierto, donde luchan por sobrevivir y crecen juntos en su mayor aventura.", "sensacine_id": "327254", "tmdb_id": 1437198}, {"id": 48, "title": "Te van a matar", "director": "Kirill Sokolov", "genre": "Acción, Comedia, Terror", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/86/d8/86d88028ffaf06446239539602901819.jpg", "rating": null, "synopsis": "Una mujer acepta un empleo como ama de llaves en un gran rascacielos de Nueva York, sin poder imaginar que bajo su elegante apariencia se ocultan grandes secretos. Pronto descubre que el edificio esconde un historia de desapariciones y sucesos inexplicables que envuelven a sus residentes en un misterio que va en aumento. Mientras investiga lo que está pasando, se enfrenta a amenazas y enigmas que la obligan a poner a prueba su ingenio y coraje para sobrevivir y descubrir los secretos que se esconden en el edifico.", "sensacine_id": "1000004914", "tmdb_id": null}, {"id": 49, "title": "Torrente presidente", "director": "Santiago Segura", "genre": "Comedia", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/ce/63/ce63bc4bd27995d49be93a2891504e53.png", "rating": null, "synopsis": "Una tarde a la hora de la comida en un bar. Allí, dos importantes afiliados al parido de extrema derecha NOX, se fijan en la actitud y el magnetismo que desprende Jose Luis Torrente con los parroquianos del lugar, y deciden invitarle para hablar en un par de mítines. Lo que estos dos jóvenes desconocen es que abren la caja de los truenos y Torrente poco a poco comienza a ganar poder dentro del partido y su discurso fascista empieza a calar entre los votantes. A partir de ahí comienzan una serie de acontecimientos a cada cual más surrealista, en la sexta sátira de la sociedad española -a manos del director y actor Santiago Segura- vista desde la óptica del policía más marrano e irreverente del cine español.", "sensacine_id": "324865", "tmdb_id": null}, {"id": 50, "title": "Tres adioses", "director": "Isabel Coixet", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/f4/0e/f40e5bf6fa7c09e667c1f159c50c88c2.jpg", "rating": null, "synopsis": "Tras una discusión que no parece gran cosa, Marta y Antonio deciden separarse. Él, un chef en ascenso, se vuelca en la cocina para superar la ruptura, mientras ella se sumerge en un silencio que pronto revela algo más que tristeza: ha perdido el apetito. Cuando descubre que su malestar esconde un problema de salud, su vida cambia por completo.De pronto, los sentidos se intensifican: la comida recupera su sabor, la música la conmueve y el deseo renace, impulsándola a vivir plenamente y sin miedo.", "sensacine_id": "1000019852", "tmdb_id": null}, {"id": 51, "title": "Una batalla tras otra", "director": "Paul Thomas Anderson", "genre": "Acción, Drama, Comedia", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/a6/af/a6af650c0fe2634ffe65b610e02fe489.jpg", "rating": null, "synopsis": "Bob Ferguson es un ex revolucionario cuya vida da un giro cuando su hija es secuestrada por un enemigo de su pasado. Desesperado por recuperarla, Bob se ve obligado a confrontar viejas heridas y a recurrir a un grupo de antiguos compañeros revolucionarios liderados por el experimentado Sensei Sergio.Juntos planean enfrentarse a fuerzas peligrosas, combinando astucia, estrategia y habilidades adquiridas en su pasado militante. La historia mezcla acción, suspenso y redención mientras Bob lucha por salvar a su hija y reconciliarse con su historia.", "sensacine_id": "311364", "tmdb_id": null}, {"id": 52, "title": "Una hija en Tokio", "director": "Guillaume Senez", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/7d/3d/7d3d7bfde0c5ca13e16ff92ffbf6495b.jpg", "rating": null, "synopsis": "Jay es un taxista que ha pasado 13 años en Japón y recorre las calles de Tokio cada noche mientras carga con la ausencia de su hija, Lily, a quien no ha visto en casi una década. Después de una dolorosa separación, Jay perdió el derecho a la custodia compartida y, tras años de búsqueda sin éxito, se ha vuelto a Francia. Sin embargo, justo cuando está a punto de abandonar el país y su esperanza, un encuentro inesperado sucede: una noche, Lily sube a su taxi, dándole a Jay una oportunidad inesperada de reencontrarse con su hija.", "sensacine_id": "313955", "tmdb_id": 1021643}, {"id": 53, "title": "Valor sentimental", "director": "Joachim Trier", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/35/66/35661f40931132d1af3e82b56fed553f.jpg", "rating": null, "synopsis": "Nora y su hermana Agnes intentan superar la reciente pérdida de su madre cuando su padre, Gustav, regresa de forma inesperada a sus vidas. Con la intención de volver a conectar, Gustav les presenta un guion que ha escrito, ofreciéndole a Nora el papel principal. Pero Nora, que aún está dolida y desconfía, lo rechaza de forma tajante. Mientras las tensiones familiares van creciendo, las tres personas enfrentan viejas heridas, silencios incómodos y la difícil tarea de reconstruir los lazos rotos por el tiempo y el dolor.", "sensacine_id": "298726", "tmdb_id": null}, {"id": 54, "title": "Viridiana", "director": "Luis Buñuel", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/medias/nmedia/18/36/27/75/18468012.jpg", "rating": null, "synopsis": "Viridiana (Silvia Pinal, 'El ángel exterminador'), una joven novicia, visita a su tío, don Jaime (Fernado Rey, 'Elisa, vida mía'), en una hacienda de la meseta castellana. El gran parecido existente entre Viridiana y la difunta esposa de don Jaime, quien falleció en su noche de bodas treinta años antes, le llevará a Jaime a pedirle a Viridiana que se case con él. Ella rechaza la petición de su tío, pero acepta, sin embargo, a vestirse con el traje de novia de la difunta. Don Jaime aprovechará esta ocasión para narcotizar a Viridiana con la complicidad de su criada Ramona y abusar de ella, aunque al final desiste de su intento sexual. Cuando Viridiana se recupera y se dispone a regresar a su convento, descubre horrorizada que su tío se suicidó la noche anterior.La joven Viridiana se siente culpable y renuncia a los hábitos para dedicarse a acoger y cuidar a los mendigos que rondan las posesiones de su tio. Su rutina es esa hasta la llegada de Jorge (Francisco Rabal, 'Goya en Burdeos'), heredero directo de las posesiones de don Jaime, quien viene acompañado de su amante para hacerse cargo de la hacienda.", "sensacine_id": "1244", "tmdb_id": null}, {"id": 55, "title": "Walkabout", "director": "Nicolas Roeg", "genre": "Aventura, Drama", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/pictures/210/073/21007330_20130521170947588.jpg", "rating": null, "synopsis": "Adaptación cinematográfica de la novela \"Walkabout\", escrita en 1959 por James Vance Marshall. Un viaje al interior del desierto de Australia donde la naturaleza salvaje y la vida humana coexisten sin otro deseo que la pura supervivencia. Tras el suicidio de su padre, dos hermanos británicos (Jenny Agutter y Luc Roeg) huyen hacia el desierto. Los pequeños, que solo conocen la vida en la ciudad, se ven obligados a sobrevivir en una tierra desconocida, donde escasea el agua, el alimento y, sobre todo, las ilusiones. En el camino conocen a un joven aborigen que se encuentra realizando su tradicional \"walkabout\", un rito de iniciación de los aborígenes australianos en el que, durante unos meses, deben vivir en el desierto. A partir de ahí, las vidas de los hermanos cambian...Debut en la dirección de Nicolas Roeg, conocido por títulos como Amenaza en la sombra o La maldición de las brujas.", "sensacine_id": "4415", "tmdb_id": null}, {"id": 56, "title": "Whistle: El silbido del mal", "director": "Corin Hardy", "genre": "Terror", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/6b/a0/6ba0fbaa8f5734ee8d0b85195b9b6b3b.jpg", "rating": null, "synopsis": "Un grupo de estudiantes inadaptados encuentra accidentalmente un antiguo silbato azteca maldito. Al soplarlo, liberan un terrorífico sonido que invoca sus futuras muertes, convirtiéndose en presas de un destino mortal.A medida que las víctimas se multiplican, los amigos luchan contra el miedo y la desesperación para descubrir el origen del artefacto y detener la cadena de sucesos macabros que han desatado, enfrentándose a fuerzas sobrenaturales que desafían toda lógica y ponen a prueba su valor y su amistad.", "sensacine_id": "321708", "tmdb_id": 1193501}, {"id": 57, "title": "Yo te creo", "director": "Charlotte Devillers | Arnaud Dufeys", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/4e/6a/4e6af0b2ab85d2adb3933461a5e83d17.jpg", "rating": null, "synopsis": "Hoy Alice se enfrenta a un momento decisivo ante el juez donde cualquier error puede cambiar el destino de sus hijos. Obligada a hablar en su nombre debe confrontar a su padre en una batalla legal cargada de tensión emocional. Cada palabra, cada gesto cuenta mientras lucha por protegerlos y asegurar su bienestar.La historia sigue su angustia y determinación mostrando el peso de la responsabilidad y la fuerza del vínculo maternal, en un enfrentamiento donde el tiempo y la justicia parecen jugar en su contra, y la esperanza pende de un hilo.", "sensacine_id": "325519", "tmdb_id": null}, {"id": 58, "title": "Your Name", "director": "Makoto Shinkai", "genre": "Animación, Fantasía", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/pictures/17/02/08/13/45/536055.jpg", "rating": null, "synopsis": "La joven Mitsuha vive en un pequeño pueblecito entre las montañas. Sin muchas sorpresas ni demasiadas emociones, la adolescente tiene un par de amigos, además de a su hermana pequeña, su abuela y su padre, con el que tiene una relación algo distante. La única expectación un poco emocionante es el cometa Tiamat, que está pasando cerca de la Tierra y por unos días será visible a simple vista. Pero un día despierta y descubre con asombro que no reconoce su cuerpo, y piensa que se trata de un extraño sueño. Pero no es así: se encuentra dentro del cuerpo de un chico, concretamente de Taki, un joven estudiante de bachillerato de la gran ciudad de Tokio. A Taki le sucederá lo mismo, y es Mitsuha la que se intercambia con él. Metidos dentro de un cuerpo que les resulta tan extraño, poco a poco, los dos jóvenes empiezan a comunicarse y, torpemente, van superando los retos que se presentan en ambas vidas. De esta forma, el vínculo que tienen se convierte en algo más. Lo que no saben es que algo inesperado está a punto de ser revelado. Filme de animación dirigido por el nipón Makoto Shinkai, responsable de filmes como El jardín de las palabras (2013), Viaje a Agartha (2011) o 5 centímetros por segundo (2007).", "sensacine_id": "249877", "tmdb_id": null}, {"id": 59, "title": "Zootrópolis 2", "director": "Byron Howard | Jared Bush", "genre": "Animación, Aventura, Familia, Comedia", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/95/4c/954c30eb27156ff168370a46ca2a3f5b.jpg", "rating": null, "synopsis": "Judy y Nick se enfrentan a un nuevo y enigmático desafío cuando un misterioso reptil llega a Zootopia y altera por completo la vida en la metrópolis de los mamíferos. Siguiendo su peligrosa pista, ambos se ven obligados a meterse de incógnito en rincones que nunca antes habían explorado de la ciudad, donde descubrirán secretos ocultos y se toparán con inesperados obstáculos.En medio de esta misión, su sociedad (cada vez más sólida pero también más exigida) será puesta a prueba como nunca, revelando la fuerza y los límites de su unión.", "sensacine_id": "277428", "tmdb_id": null}, {"id": 60, "title": "¡La novia!", "director": "Maggie Gyllenhaal", "genre": "Drama, Suspense, Romántico, Ciencia ficción, Terror", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/aa/05/aa0515d133a7885cf864d3e9b0fc747e.jpg", "rating": null, "synopsis": "En el Chicago de los años 30, Frankenstein recurre al Dr. Euphronius para crear una compañera, dando vida a una mujer asesinada conocida como la Novia. Esta petición despierta una intensa relación entre ambos, mientras la policía comienza a investigar los extraños sucesos.La presencia de la Novia no solo genera un inesperado romance, sino que también provoca un cambio social que desafía las normas de la época y transforma la percepción de la vida, la muerte y las relaciones humanas en la ciudad.", "sensacine_id": "180943", "tmdb_id": null}, {"id": 61, "title": "Águilas de el Cairo", "director": "Tarik Saleh", "genre": "Drama, Suspense", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/59/3f/593fa084b0908ac3b76af3373681d602.jpg", "rating": null, "synopsis": "George Fahmy, el actor más querido de Egipto, es presionado para protagonizar una película encargada por las altas esferas del poder. Aunque acepta a regañadientes, el papel lo introduce en un círculo privilegiado y peligroso. Fascinado por el poder, George comienza un romance prohibido con la enigmática esposa del general que dirige el proyecto. Como una polilla atraída por la luz, su ambición y deseo lo arrastran a una red de secretos y traiciones que pondrá en riesgo su carrera, su libertad y su vida.", "sensacine_id": "324956", "tmdb_id": null}];

// Genre visual themes: [gradient, icon, extra CSS class]
const GENRE_THEMES = {
  'Terror':     { grad: 'linear-gradient(160deg, #1a0000 0%, #4a0e0e 40%, #8b0000 100%)', icon: '🩸', fx: 'flicker' },
  'Misterio':   { grad: 'linear-gradient(160deg, #0a0a1a 0%, #1a1a3e 50%, #2d1b4e 100%)', icon: '🔍', fx: 'scan' },
  'Thriller':   { grad: 'linear-gradient(160deg, #0a1a0a 0%, #1a2e1a 50%, #2e3e1e 100%)', icon: '🗡️', fx: 'scan' },
  'Drama':      { grad: 'linear-gradient(160deg, #1a1a2e 0%, #2a1a3e 50%, #3a2a5e 100%)', icon: '🎭', fx: 'shimmer' },
  'Comedia':    { grad: 'linear-gradient(160deg, #2e2a00 0%, #4e3a00 50%, #6e5a10 100%)', icon: '😂', fx: 'bounce' },
  'Acción':     { grad: 'linear-gradient(160deg, #1a0a00 0%, #3e1a00 50%, #6e3a00 100%)', icon: '💥', fx: 'pulse' },
  'Ciencia ficción': { grad: 'linear-gradient(160deg, #001a2e 0%, #002a4e 50%, #004a6e 100%)', icon: '🚀', fx: 'pulse' },
  'Animación':  { grad: 'linear-gradient(160deg, #1a0a2e 0%, #2e1a5e 30%, #e94560 70%, #f5c518 100%)', icon: '✨', fx: 'bounce' },
  'Romance':    { grad: 'linear-gradient(160deg, #2e0a1a 0%, #4e1a2a 50%, #6e2a4a 100%)', icon: '💕', fx: 'shimmer' },
  'Documental': { grad: 'linear-gradient(160deg, #1a1a0a 0%, #2e2a1a 50%, #4e3e2a 100%)', icon: '🎞️', fx: 'grain-heavy' },
  'Música':     { grad: 'linear-gradient(160deg, #0a1a2e 0%, #1a2e4e 50%, #3a4e6e 100%)', icon: '🎵', fx: 'bounce' },
  'Aventura':   { grad: 'linear-gradient(160deg, #0a2e1a 0%, #1a4e2a 50%, #2a6e3a 100%)', icon: '🗺️', fx: 'shimmer' },
  'Ciclo':      { grad: 'linear-gradient(160deg, #1a1a1a 0%, #2a2a2a 50%, #3a3a3a 100%)', icon: '🎬', fx: 'grain-heavy' },
};

function getGenreTheme(genreStr) {
  if (!genreStr) return { grad: 'linear-gradient(160deg, #1a1a2e, #2a2a4e)', icon: '🎬', fx: '' };
  const genres = genreStr.split(',').map(g => g.trim());
  // Try each genre in order of specificity
  for (const g of genres) {
    if (GENRE_THEMES[g]) return GENRE_THEMES[g];
  }
  return { grad: 'linear-gradient(160deg, #1a1a2e, #2a2a4e)', icon: '🎬', fx: '' };
}

function generatePosterHtml(title, genre) {
  const theme = getGenreTheme(genre);
  const genres = (genre || '').split(',').map(g => g.trim());

  // Create animated particles (colors based on genre)
  let particles = '';
  const colors = {
    'Terror': ['#ff0000','#8b0000','#ff4444'],
    'Animación': ['#e94560','#f5c518','#64b5f6','#81c784','#ce93d8'],
    'Acción': ['#ff6600','#ff9900','#ffcc00'],
    'Ciencia ficción': ['#00ccff','#0088ff','#00ffcc'],
    'Romance': ['#ff69b4','#ff1493','#ff6eb4'],
    'Comedia': ['#f5c518','#ffcc00','#ff9900'],
    'Música': ['#64b5f6','#42a5f5','#90caf9'],
  };
  const pColors = colors[genres[0]] || ['#ffffff','#aaaaaa','#888888'];
  for (let i = 0; i < 6; i++) {
    const c = pColors[i % pColors.length];
    const left = 10 + Math.floor((i * 37 + 13) % 80);
    const size = 3 + (i % 4);
    const delay = (i * 0.7).toFixed(1);
    particles += `<span style="left:${left}%;width:${size}px;height:${size}px;background:${c};animation-delay:${delay}s"></span>`;
  }

  // FX elements
  let fxHtml = '';
  if (theme.fx === 'scan') fxHtml = '<div class="gp-scanline"></div>';

  // Animation style per fx
  let fxStyle = '';
  if (theme.fx === 'flicker') fxStyle = 'animation: flicker 3s infinite;';
  if (theme.fx === 'shimmer') fxStyle = 'background-size: 200% 100%; animation: shimmer 4s ease infinite;';
  if (theme.fx === 'pulse') fxStyle = 'animation: pulse-glow 2.5s ease-in-out infinite;';

  let iconStyle = '';
  if (theme.fx === 'bounce') iconStyle = 'animation: bounce-icon 2s ease-in-out infinite;';

  return `<div class="gen-poster" style="background:${theme.grad};${fxStyle}">
    <div class="gp-particles">${particles}</div>
    ${fxHtml}
    <div class="gp-icon" style="${iconStyle}">${theme.icon}</div>
    <div class="gp-genre">${genres[0] || ''}</div>
    <div class="gp-title">${title.replace(/ *\(.*\)$/, '')}</div>
  </div>`;
}

    document.getElementById('peliculas-tab').style.display = name === 'peliculas' ? '' : 'none';

    document.getElementById('cines-tab').style.display = name === 'cines' ? '' : 'none';

    if (name === 'peliculas') renderMovies();
    if (name === 'conciertos') { renderConcertStats(); renderConcertDateFilters(); renderConcerts(); }
