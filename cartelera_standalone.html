<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guía del Ocio Madrid — Cartelera</title>
<style>
  :root {
    --bg: #0f0f0f;
    --card: #1a1a2e;
    --accent: #e94560;
    --text: #eee;
    --muted: #888;
    --border: #2a2a3e;
    --gold: #f5c518;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    padding: 1.5rem 2rem;
    border-bottom: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }
  header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; }
  header h1 span { color: var(--accent); }
  .controls { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
  .controls label { font-size: 0.85rem; color: var(--muted); }
  .controls input[type="date"],
  .controls select {
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 0.4rem 0.6rem; font-size: 0.9rem;
  }
  .tabs { display: flex; gap: 0; margin: 1.5rem 2rem 0; }
  .tab {
    padding: 0.6rem 1.4rem; background: var(--card);
    border: 1px solid var(--border); border-bottom: none;
    cursor: pointer; font-size: 0.9rem; color: var(--muted);
    border-radius: 8px 8px 0 0; transition: all 0.2s;
  }
  .tab.active {
    background: var(--bg); color: var(--text);
    border-color: var(--accent); border-bottom-color: var(--bg);
  }
  .content { padding: 1.5rem 2rem; }
  .stats { display: flex; gap: 1.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .stat-box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.8rem 1.2rem; min-width: 120px;
  }
  .stat-box .num { font-size: 1.8rem; font-weight: 700; color: var(--accent); }
  .stat-box .label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .movies-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1.2rem;
  }
  .movie-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }
  .movie-card:hover { transform: translateY(-3px); border-color: var(--accent); }
  .movie-card .top { display: flex; gap: 1rem; padding: 1rem; }
  .movie-card .poster {
    width: 100px; height: 150px; border-radius: 6px;
    object-fit: cover; background: var(--border); flex-shrink: 0;
  }
  .movie-card .poster-placeholder {
    width: 100px; height: 150px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; position: relative; overflow: hidden;
  }
  /* YouTube thumbnail poster */
  .yt-poster {
    width: 100px; height: 150px; border-radius: 6px;
    position: relative; overflow: hidden; flex-shrink: 0;
    cursor: pointer; background: var(--border);
  }
  .yt-poster img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.3s, filter 0.3s;
  }
  .yt-poster:hover img { transform: scale(1.05); filter: brightness(0.7); }
  .yt-poster .play-btn {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 32px; height: 32px; background: rgba(229,69,96,0.9);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.3s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .yt-poster:hover .play-btn { opacity: 1; }
  .yt-poster .play-btn::after {
    content: ''; width: 0; height: 0;
    border-style: solid; border-width: 6px 0 6px 11px;
    border-color: transparent transparent transparent #fff;
    margin-left: 2px;
  }
  /* Trailer modal */
  .trailer-modal {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.92); display: none;
    align-items: center; justify-content: center;
    padding: 1rem;
  }
  .trailer-modal.active { display: flex; }
  .trailer-modal .modal-content {
    position: relative; width: 100%; max-width: 800px;
    aspect-ratio: 16/9; border-radius: 10px; overflow: hidden;
    box-shadow: 0 4px 30px rgba(0,0,0,0.5);
  }
  .trailer-modal iframe {
    width: 100%; height: 100%; border: none;
  }
  .trailer-modal .close-btn {
    position: absolute; top: -36px; right: 0;
    background: none; border: none; color: #fff;
    font-size: 1.6rem; cursor: pointer; padding: 0.2rem 0.5rem;
    opacity: 0.7; transition: opacity 0.2s;
  }
  .trailer-modal .close-btn:hover { opacity: 1; }
  /* Genre-based animated poster styles */
  .gen-poster {
    width: 100px; height: 150px; border-radius: 6px;
    position: relative; overflow: hidden; flex-shrink: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
    padding: 0.4rem; text-align: center;
  }
  .gen-poster .gp-title {
    font-size: 0.55rem; font-weight: 700; color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8); z-index: 2;
    line-height: 1.2; max-height: 3rem; overflow: hidden;
    letter-spacing: 0.3px; text-transform: uppercase;
  }
  .gen-poster .gp-genre {
    font-size: 0.45rem; color: rgba(255,255,255,0.7);
    text-transform: uppercase; letter-spacing: 1px; z-index: 2;
    margin-bottom: 0.2rem;
  }
  .gen-poster .gp-icon {
    font-size: 1.8rem; z-index: 2; margin-bottom: 0.3rem;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
  }
  .gen-poster::before {
    content: ''; position: absolute; inset: 0; z-index: 1;
    background: inherit; opacity: 0.15;
  }
  /* Animated grain overlay */
  .gen-poster::after {
    content: ''; position: absolute; inset: -50%; z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
    background-size: 128px 128px;
    animation: grain 4s steps(8) infinite;
    pointer-events: none;
  }
  @keyframes grain {
    0%, 100% { transform: translate(0, 0); }
    10% { transform: translate(-5%, -5%); }
    30% { transform: translate(3%, -8%); }
    50% { transform: translate(-3%, 5%); }
    70% { transform: translate(7%, 2%); }
    90% { transform: translate(-2%, 4%); }
  }
  /* Floating particles for animated genres */
  .gen-poster .gp-particles {
    position: absolute; inset: 0; z-index: 1; overflow: hidden;
  }
  .gen-poster .gp-particles span {
    position: absolute; border-radius: 50%; opacity: 0.4;
    animation: float-up 4s ease-in infinite;
  }
  @keyframes float-up {
    0% { transform: translateY(100%) scale(0); opacity: 0; }
    20% { opacity: 0.6; }
    100% { transform: translateY(-100%) scale(1); opacity: 0; }
  }
  /* Scan line for thriller */
  .gp-scanline {
    position: absolute; left: 0; right: 0; height: 2px;
    background: rgba(255,255,255,0.15); z-index: 2;
    animation: scan 3s linear infinite;
  }
  @keyframes scan {
    0% { top: -2px; } 100% { top: 100%; }
  }
  /* Flicker for terror */
  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.4; }
    97% { opacity: 0.9; }
    98% { opacity: 0.3; }
  }
  /* Shimmer for drama */
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  /* Pulse glow for sci-fi */
  @keyframes pulse-glow {
    0%, 100% { box-shadow: inset 0 0 15px rgba(0,200,255,0.2); }
    50% { box-shadow: inset 0 0 25px rgba(0,200,255,0.5); }
  }
  /* Bounce for animation genre */
  @keyframes bounce-icon {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .movie-card .info { flex: 1; min-width: 0; }
  .movie-card .title { font-size: 1.05rem; font-weight: 600; margin-bottom: 0.3rem; line-height: 1.3; }
  .movie-card .meta { font-size: 0.8rem; color: var(--muted); line-height: 1.5; }
  .movie-card .synopsis { font-size: 0.78rem; color: var(--muted); margin-top: 0.4rem; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .movie-card .rating {
    display: inline-flex; align-items: center; gap: 0.25rem;
    color: var(--gold); font-weight: 600; font-size: 0.9rem; margin-top: 0.3rem;
  }
  .movie-card .showtimes-section { border-top: 1px solid var(--border); padding: 0.8rem 1rem; }
  .movie-card .cinema-group { margin-bottom: 0.6rem; }
  .movie-card .cinema-group:last-child { margin-bottom: 0; }
  .movie-card .cinema-name {
    font-size: 0.75rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 0.3rem;
  }
  .time-chips { display: flex; flex-wrap: wrap; gap: 0.3rem; }
  .chip {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; padding: 0.2rem 0.5rem;
    font-size: 0.78rem; white-space: nowrap;
  }
  .chip.vose { border-color: #4caf50; color: #81c784; }
  .chip.imax { border-color: #2196f3; color: #64b5f6; }
  .chip.atmos { border-color: #9c27b0; color: #ce93d8; }
  .chip.three-d { border-color: #ff9800; color: #ffb74d; }
  .cinemas-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
  }
  .cinema-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 1rem 1.2rem;
  }
  .cinema-card h3 { font-size: 1rem; margin-bottom: 0.3rem; }
  .cinema-card .addr { font-size: 0.8rem; color: var(--muted); }
  .cinema-card .movie-count { font-size: 0.75rem; color: var(--accent); margin-top: 0.4rem; }
  .loading { text-align: center; padding: 3rem; color: var(--muted); font-size: 1.1rem; }
  .empty { text-align: center; padding: 3rem; color: var(--muted); }
  .filter-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .filter-btn {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 0.35rem 0.9rem;
    color: var(--muted); cursor: pointer; font-size: 0.8rem; transition: all 0.2s;
  }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  @media (max-width: 600px) {
    .movies-grid { grid-template-columns: 1fr; }
    header { padding: 1rem; }
    .content { padding: 1rem; }
    .tabs { margin: 1rem 1rem 0; }
  }
</style>
</head>

  return { grad: 'linear-gradient(160deg, #1a1a2e, #2a2a4e)', icon: '🎬', fx: '' };
}

  };
  const pColors = colors[genres[0]] || ['#ffffff','#aaaaaa','#888888'];
  for (let i = 0; i < 6; i++) {
    const c = pColors[i % pColors.length];
    const left = 10 + Math.floor((i * 37 + 13) % 80);
    const size = 3 + (i % 4);
    const delay = (i * 0.7).toFixed(1);
    particles += `<span style="left:${left}%;width:${size}px;height:${size}px;background:${c};animation-delay:${delay}s"></span>`;
  }

  // FX elements
  let fxHtml = '';
  if (theme.fx === 'scan') fxHtml = '<div class="gp-scanline"></div>';

  // Animation style per fx
  let fxStyle = '';
  if (theme.fx === 'flicker') fxStyle = 'animation: flicker 3s infinite;';
  if (theme.fx === 'shimmer') fxStyle = 'background-size: 200% 100%; animation: shimmer 4s ease infinite;';
  if (theme.fx === 'pulse') fxStyle = 'animation: pulse-glow 2.5s ease-in-out infinite;';

  let iconStyle = '';
  if (theme.fx === 'bounce') iconStyle = 'animation: bounce-icon 2s ease-in-out infinite;';

  return `<div class="gen-poster" style="background:${theme.grad};${fxStyle}">
    <div class="gp-particles">${particles}</div>
    ${fxHtml}
    <div class="gp-icon" style="${iconStyle}">${theme.icon}</div>
    <div class="gp-genre">${genres[0] || ''}</div>
    <div class="gp-title">${title.replace(/ *\(.*\)$/, '')}</div>
  </div>`;
}

// Poster cache
const posterCache = {};

// Try to fetch real posters from TMDB (optional enhancement)
async function fetchPosters() {
  const apiKey = localStorage.getItem('tmdb_api_key') || '';
  if (!apiKey) return; // Generated posters are already shown

  const apiBase = 'https://api.themoviedb.org/3/movie/';
  for (const [title, tmdbId] of Object.entries(TMDB_IDS)) {
    try {
      const resp = await fetch(`${apiBase}${tmdbId}?api_key=${apiKey}&language=es-ES`);
      if (resp.ok) {
        const data = await resp.json();
        if (data.poster_path) {
          posterCache[title] = `https://image.tmdb.org/t/p/w500${data.poster_path}`;
        }
      }
    } catch(e) { /* silently skip */ }
  }

  // Replace generated posters with real ones
  document.querySelectorAll('[data-poster-title]').forEach(el => {
    const title = el.dataset.posterTitle;
    if (posterCache[title]) {
      const img = document.createElement('img');
      img.className = 'poster';
      img.src = posterCache[title];
      img.alt = title;
      img.loading = 'lazy';
      img.onerror = () => { /* keep generated poster on error */ };
      el.replaceWith(img);
    }
  });
}

let allShowtimes = EMBEDDED_SHOWTIMES;
let allMovies = EMBEDDED_MOVIES;
let allCinemas = EMBEDDED_CINEMAS;
let activeLanguageFilter = '';

const datePicker = document.getElementById('datePicker');
const cinemaFilter = document.getElementById('cinemaFilter');
cinemaFilter.addEventListener('change', () => renderMovies());

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const name = tab.dataset.tab;
    document.getElementById('peliculas-tab').style.display = name === 'peliculas' ? '' : 'none';
    document.getElementById('cines-tab').style.display = name === 'cines' ? '' : 'none';
    if (name === 'cines') loadCinemas();
  });
});

function renderStats() {
  const cinemaCount = new Set(allShowtimes.map(s => s.cinema)).size;
  const voseCount = allShowtimes.filter(s => s.language === 'VOSE').length;
  document.getElementById('stats').innerHTML = `
    <div class="stat-box"><div class="num">${allMovies.length}</div><div class="label">Películas</div></div>
    <div class="stat-box"><div class="num">${allShowtimes.length}</div><div class="label">Sesiones</div></div>
    <div class="stat-box"><div class="num">${cinemaCount}</div><div class="label">Cines</div></div>
    <div class="stat-box"><div class="num">${voseCount}</div><div class="label">VOSE</div></div>
  `;
}

function renderLanguageFilters() {
  const langs = [...new Set(allShowtimes.map(s => s.language))].sort();
  const bar = document.getElementById('lang-filters');
  bar.innerHTML = `<div class="filter-btn ${activeLanguageFilter === '' ? 'active' : ''}" data-lang="">Todos</div>`;
  langs.forEach(lang => {
    bar.innerHTML += `<div class="filter-btn ${activeLanguageFilter === lang ? 'active' : ''}" data-lang="${lang}">${lang}</div>`;
  });
  bar.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeLanguageFilter = btn.dataset.lang;
      renderLanguageFilters();
      renderMovies();
    });
  });
}

function renderMovies() {
  const container = document.getElementById('movies-container');
  const selectedCinema = cinemaFilter.value;

  let filtered = allShowtimes;
  if (selectedCinema) filtered = filtered.filter(s => s.cinema === selectedCinema);
  if (activeLanguageFilter) filtered = filtered.filter(s => s.language === activeLanguageFilter);

  const movieMap = new Map();
  filtered.forEach(s => {
    if (!movieMap.has(s.movie)) {
      const mv = allMovies.find(m => m.title === s.movie) || {};
      movieMap.set(s.movie, { ...mv, title: s.movie, showtimes: [] });
    }
    movieMap.get(s.movie).showtimes.push(s);
  });

  if (movieMap.size === 0) {
    container.className = 'empty';
    container.textContent = 'No hay sesiones para esta fecha / filtro.';
    return;
  }

  const movies = [...movieMap.values()].sort((a, b) => (b.rating || 0) - (a.rating || 0));

  // Populate cinema filter
  const cinemaNames = [...new Set(allShowtimes.map(s => s.cinema))].sort();
  if (cinemaFilter.options.length <= 1) {
    cinemaNames.forEach(name => {
      const opt = document.createElement('option');
      opt.value = name; opt.textContent = name;
      cinemaFilter.appendChild(opt);
    });
  }

  container.className = 'movies-grid';
  container.innerHTML = movies.map(mv => {
    const byCinema = {};
    mv.showtimes.forEach(s => {
      if (!byCinema[s.cinema]) byCinema[s.cinema] = [];
      byCinema[s.cinema].push(s);
    });

    const ytId = YOUTUBE_TRAILERS[mv.title];
    const hasPoster = posterCache[mv.title];
    let posterHtml;
    if (ytId) {
      // YouTube thumbnail with play button
      posterHtml = `<div class="yt-poster" onclick="openTrailer('${ytId}')" title="Ver tráiler">
        <img src="https://img.youtube.com/vi/${ytId}/hqdefault.jpg" alt="${esc(mv.title)}" loading="lazy"
          onerror="this.parentElement.outerHTML=generatePosterHtml('${esc(mv.title).replace(/'/g,"\\'")}','${esc(mv.genre||'').replace(/'/g,"\\'")}')">
        <div class="play-btn"></div>
      </div>`;
    } else if (hasPoster) {
      posterHtml = `<img class="poster" src="${posterCache[mv.title]}" alt="${esc(mv.title)}" loading="lazy"
        onerror="this.outerHTML=generatePosterHtml('${esc(mv.title).replace(/'/g,"\\'")}','${esc(mv.genre||'').replace(/'/g,"\\'")}')">`;
    } else {
      posterHtml = `<div data-poster-title="${esc(mv.title)}">${generatePosterHtml(mv.title, mv.genre)}</div>`;
    }

    const ratingHtml = mv.rating
      ? `<div class="rating">★ ${mv.rating.toFixed(1)}</div>` : '';

    const metaParts = [mv.director, mv.genre, mv.duration_min ? `${mv.duration_min} min` : null].filter(Boolean);

    const synopsisHtml = mv.synopsis
      ? `<div class="synopsis">${esc(mv.synopsis)}</div>` : '';

    const cinemaGroups = Object.entries(byCinema).map(([cinema, sts]) => {
      const chips = sts
        .sort((a, b) => a.time.localeCompare(b.time))
        .map(s => {
          let cls = 'chip';
          if (s.language === 'VOSE') cls += ' vose';
          if (s.format === 'IMAX') cls += ' imax';
          else if (s.format === 'Atmos') cls += ' atmos';
          else if (s.format === '3D') cls += ' three-d';
          const label = s.time + (s.language === 'VOSE' ? ' VOSE' : '') + (s.format !== '2D' ? ' ' + s.format : '');
          return `<span class="${cls}">${label}</span>`;
        }).join('');
      return `<div class="cinema-group"><div class="cinema-name">${esc(cinema)}</div><div class="time-chips">${chips}</div></div>`;
    }).join('');

    return `
      <div class="movie-card">
        <div class="top">
          ${posterHtml}
          <div class="info">
            <div class="title">${esc(mv.title)}</div>
            <div class="meta">${esc(metaParts.join(' · '))}</div>
            ${ratingHtml}
            ${synopsisHtml}
          </div>
        </div>
        <div class="showtimes-section">${cinemaGroups}</div>
      </div>`;
  }).join('');
}

function loadCinemas() {
  const container = document.getElementById('cinemas-container');
  if (allCinemas.length === 0) {
    container.className = 'empty';
    container.textContent = 'No hay cines en la base de datos.';
    return;
  }
  // Count movies per cinema from showtimes
  const moviesByCinema = {};
  allShowtimes.forEach(s => {
    if (!moviesByCinema[s.cinema]) moviesByCinema[s.cinema] = new Set();
    moviesByCinema[s.cinema].add(s.movie);
  });

  container.className = 'cinemas-list';
  container.innerHTML = allCinemas.map(c => {
    const movieCount = moviesByCinema[c.name] ? moviesByCinema[c.name].size : 0;
    const showtimeCount = allShowtimes.filter(s => s.cinema === c.name).length;
    return `
      <div class="cinema-card">
        <h3>${esc(c.name)}</h3>
        <div class="addr">${esc(c.address || c.external_id)}</div>
        <div class="movie-count">${movieCount} películas · ${showtimeCount} sesiones</div>
      </div>`;
  }).join('');
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Initialize
renderStats();
renderLanguageFilters();
renderMovies();

// Fetch posters asynchronously (updates UI when ready)
fetchPosters();

// Trailer modal
function openTrailer(ytId) {
  const modal = document.getElementById('trailerModal');
  const frame = document.getElementById('trailerFrame');
  frame.src = `https://www.youtube.com/embed/${ytId}?autoplay=1&rel=0&modestbranding=1`;
  modal.classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeTrailer(e) {
  if (e && e.target !== e.currentTarget && !e.target.classList.contains('close-btn')) return;
  const modal = document.getElementById('trailerModal');
  const frame = document.getElementById('trailerFrame');
  frame.src = '';
  modal.classList.remove('active');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeTrailer(); });
</script>
