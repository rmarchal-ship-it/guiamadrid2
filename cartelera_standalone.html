<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guía del Ocio Madrid — Cartelera</title>
<style>
  :root {
    --bg: #0f0f0f;
    --card: #1a1a2e;
    --accent: #e94560;
    --text: #eee;
    --muted: #888;
    --border: #2a2a3e;
    --gold: #f5c518;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    padding: 1.5rem 2rem;
    border-bottom: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }
  header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; }
  header h1 span { color: var(--accent); }
  .controls { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
  .controls label { font-size: 0.85rem; color: var(--muted); }
  .controls input[type="date"],
  .controls select {
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 0.4rem 0.6rem; font-size: 0.9rem;
  }
  .tabs { display: flex; gap: 0; margin: 1.5rem 2rem 0; }
  .tab {
    padding: 0.6rem 1.4rem; background: var(--card);
    border: 1px solid var(--border); border-bottom: none;
    cursor: pointer; font-size: 0.9rem; color: var(--muted);
    border-radius: 8px 8px 0 0; transition: all 0.2s;
  }
  .tab.active {
    background: var(--bg); color: var(--text);
    border-color: var(--accent); border-bottom-color: var(--bg);
  }
  .content { padding: 1.5rem 2rem; }
  .stats { display: flex; gap: 1.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .stat-box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.8rem 1.2rem; min-width: 120px;
  }
  .stat-box .num { font-size: 1.8rem; font-weight: 700; color: var(--accent); }
  .stat-box .label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .movies-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1.2rem;
  }
  .movie-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }
  .movie-card:hover { transform: translateY(-3px); border-color: var(--accent); }
  .movie-card .top { display: flex; gap: 1rem; padding: 1rem; }
  .movie-card .poster {
    width: 100px; height: 150px; border-radius: 6px;
    object-fit: cover; background: var(--border); flex-shrink: 0;
  }
  .movie-card .poster-placeholder {
    width: 100px; height: 150px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; position: relative; overflow: hidden;
    background: var(--border); color: var(--muted);
    font-size: 0.7rem; text-align: center; padding: 0.5rem;
    font-weight: 600; line-height: 1.3;
  }
  /* YouTube thumbnail poster */
  .yt-poster {
    width: 100px; height: 150px; border-radius: 6px;
    position: relative; overflow: hidden; flex-shrink: 0;
    cursor: pointer; background: var(--border);
  }
  .yt-poster img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.3s, filter 0.3s;
  }
  .yt-poster:hover img { transform: scale(1.05); filter: brightness(0.7); }
  .yt-poster .play-btn {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 32px; height: 32px; background: rgba(229,69,96,0.9);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.3s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .yt-poster:hover .play-btn { opacity: 1; }
  .yt-poster .play-btn::after {
    content: ''; width: 0; height: 0;
    border-style: solid; border-width: 6px 0 6px 11px;
    border-color: transparent transparent transparent #fff;
    margin-left: 2px;
  }
  /* Trailer modal */
  .trailer-modal {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.92); display: none;
    align-items: center; justify-content: center;
    padding: 1rem;
  }
  .trailer-modal.active { display: flex; }
  .trailer-modal .modal-content {
    position: relative; width: 100%; max-width: 800px;
    aspect-ratio: 16/9; border-radius: 10px; overflow: hidden;
    box-shadow: 0 4px 30px rgba(0,0,0,0.5);
  }
  .trailer-modal iframe {
    width: 100%; height: 100%; border: none;
  }
  .trailer-modal .close-btn {
    position: absolute; top: -36px; right: 0;
    background: none; border: none; color: #fff;
    font-size: 1.6rem; cursor: pointer; padding: 0.2rem 0.5rem;
    opacity: 0.7; transition: opacity 0.2s;
  }
  .trailer-modal .close-btn:hover { opacity: 1; }
  /* Genre-based animated poster styles */
  .gen-poster {
    width: 100px; height: 150px; border-radius: 6px;
    position: relative; overflow: hidden; flex-shrink: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
    padding: 0.4rem; text-align: center;
  }
  .gen-poster .gp-title {
    font-size: 0.55rem; font-weight: 700; color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8); z-index: 2;
    line-height: 1.2; max-height: 3rem; overflow: hidden;
    letter-spacing: 0.3px; text-transform: uppercase;
  }
  .gen-poster .gp-genre {
    font-size: 0.45rem; color: rgba(255,255,255,0.7);
    text-transform: uppercase; letter-spacing: 1px; z-index: 2;
    margin-bottom: 0.2rem;
  }
  .gen-poster .gp-icon {
    font-size: 1.8rem; z-index: 2; margin-bottom: 0.3rem;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
  }
  .gen-poster::before {
    content: ''; position: absolute; inset: 0; z-index: 1;
    background: inherit; opacity: 0.15;
  }
  /* Animated grain overlay */
  .gen-poster::after {
    content: ''; position: absolute; inset: -50%; z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
    background-size: 128px 128px;
    animation: grain 4s steps(8) infinite;
    pointer-events: none;
  }
  @keyframes grain {
    0%, 100% { transform: translate(0, 0); }
    10% { transform: translate(-5%, -5%); }
    30% { transform: translate(3%, -8%); }
    50% { transform: translate(-3%, 5%); }
    70% { transform: translate(7%, 2%); }
    90% { transform: translate(-2%, 4%); }
  }
  /* Floating particles for animated genres */
  .gen-poster .gp-particles {
    position: absolute; inset: 0; z-index: 1; overflow: hidden;
  }
  .gen-poster .gp-particles span {
    position: absolute; border-radius: 50%; opacity: 0.4;
    animation: float-up 4s ease-in infinite;
  }
  @keyframes float-up {
    0% { transform: translateY(100%) scale(0); opacity: 0; }
    20% { opacity: 0.6; }
    100% { transform: translateY(-100%) scale(1); opacity: 0; }
  }
  /* Scan line for thriller */
  .gp-scanline {
    position: absolute; left: 0; right: 0; height: 2px;
    background: rgba(255,255,255,0.15); z-index: 2;
    animation: scan 3s linear infinite;
  }
  @keyframes scan {
    0% { top: -2px; } 100% { top: 100%; }
  }
  /* Flicker for terror */
  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.4; }
    97% { opacity: 0.9; }
    98% { opacity: 0.3; }
  }
  /* Shimmer for drama */
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  /* Pulse glow for sci-fi */
  @keyframes pulse-glow {
    0%, 100% { box-shadow: inset 0 0 15px rgba(0,200,255,0.2); }
    50% { box-shadow: inset 0 0 25px rgba(0,200,255,0.5); }
  }
  /* Bounce for animation genre */
  @keyframes bounce-icon {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .movie-card .info { flex: 1; min-width: 0; }
  .movie-card .title { font-size: 1.05rem; font-weight: 600; margin-bottom: 0.3rem; line-height: 1.3; }
  .movie-card .meta { font-size: 0.8rem; color: var(--muted); line-height: 1.5; }
  .movie-card .synopsis { font-size: 0.78rem; color: var(--muted); margin-top: 0.4rem; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .movie-card .rating {
    display: inline-flex; align-items: center; gap: 0.25rem;
    color: var(--gold); font-weight: 600; font-size: 0.9rem; margin-top: 0.3rem;
  }
  .movie-card .showtimes-section { border-top: 1px solid var(--border); padding: 0.8rem 1rem; }
  .movie-card .cinema-group { margin-bottom: 0.6rem; }
  .movie-card .cinema-group:last-child { margin-bottom: 0; }
  .movie-card .cinema-name {
    font-size: 0.75rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 0.3rem;
  }
  .time-chips { display: flex; flex-wrap: wrap; gap: 0.3rem; }
  .chip {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; padding: 0.2rem 0.5rem;
    font-size: 0.78rem; white-space: nowrap;
  }
  .chip.vose { border-color: #4caf50; color: #81c784; }
  .chip.imax { border-color: #2196f3; color: #64b5f6; }
  .chip.atmos { border-color: #9c27b0; color: #ce93d8; }
  .chip.three-d { border-color: #ff9800; color: #ffb74d; }
  .cinemas-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
  }
  .cinema-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 1rem 1.2rem; cursor: pointer;
    transition: border-color 0.2s, transform 0.2s;
  }
  .cinema-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .cinema-card.no-sessions { opacity: 0.5; cursor: default; }
  .cinema-card.no-sessions:hover { border-color: var(--border); transform: none; }
  .cinema-card h3 { font-size: 1rem; margin-bottom: 0.3rem; }
  .cinema-card .addr { font-size: 0.8rem; color: var(--muted); }
  .cinema-card .movie-count { font-size: 0.75rem; color: var(--accent); margin-top: 0.4rem; }
  .cinema-card.no-sessions .movie-count { color: var(--muted); }
  .loading { text-align: center; padding: 3rem; color: var(--muted); font-size: 1.1rem; }
  .empty { text-align: center; padding: 3rem; color: var(--muted); }
  .filter-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .filter-btn {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 0.35rem 0.9rem;
    color: var(--muted); cursor: pointer; font-size: 0.8rem; transition: all 0.2s;
  }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  @media (max-width: 600px) {
    .movies-grid { grid-template-columns: 1fr; }
    header { padding: 1rem; }
    .content { padding: 1rem; }
    .tabs { margin: 1rem 1rem 0; }
  }
</style>
</head>
<body>

<header>
  <h1><span>Guía</span>Madrid — Cartelera</h1>
  <div class="controls">
    <label>Fecha:</label>
    <input type="date" id="datePicker" value="2026-03-22">
    <select id="cinemaFilter">
      <option value="">Todos los cines</option>
    </select>
  </div>
</header>

<div class="tabs">
  <div class="tab active" data-tab="peliculas">Películas</div>
  <div class="tab" data-tab="cines">Cines</div>
</div>

<!-- Trailer modal -->
<div class="trailer-modal" id="trailerModal" onclick="closeTrailer(event)">
  <div class="modal-content">
    <button class="close-btn" onclick="closeTrailer()">&times;</button>
    <iframe id="trailerFrame" allowfullscreen allow="autoplay"></iframe>
  </div>
</div>

<div class="content">
  <div id="peliculas-tab">
    <div class="stats" id="stats"></div>
    <div class="filter-bar" id="lang-filters"></div>
    <div id="movies-container" class="loading">Cargando cartelera...</div>
  </div>
  <div id="cines-tab" style="display:none">
    <div id="cinemas-container" class="loading">Cargando cines...</div>
  </div>
</div>

<script>
// Embedded data
const EMBEDDED_MOVIES = [{"id": 1, "title": "Amarga Navidad", "director": "Pedro Almodóvar", "genre": "Comedia dramática", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/60/ff/60ff5df4d1e858aa504693e07468e58d.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Elsa es una directora de publicidad, cuya madre fallece durante un puente en el mes de diciembre. Para sobrellevar el duelo, Elsa se centra plenamente en el trabajo, sin dejar tiempo para superarlo, intentando huir hacia delante. Sin embargo, una crisis de pánico la obliga a parar y tener que descansar.</p><p class=\"bo-p\">Bonifacio, su pareja, había sido su salvación y la había ayudado a sobrellevar el fallecimiento. Pero para pasar página, Elsa decide irse a Lanzarote con su amiga Patricia, que también necesita un descanso de Madrid, mientras que Bonifacio se queda en la capital.</p>", "tmdb_id": 1088548}, {"id": 2, "title": "Arco", "director": "Ugo Bienvenu", "genre": "Animación, Ciencia ficción, Aventura", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/99/ee/99ee08c45125d376aff1ec9e122b6808.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">En un futuro lejano, Arco, un niño de 10 años, realiza su primer vuelo con un traje especial impulsado por energía arco iris. Sin embargo, algo sale mal y termina perdido en un futuro cercano, muy diferente al suyo. En este nuevo entorno, es descubierto por Iris, una niña de su misma edad, curiosa y decidida. </p><p class=\"bo-p\">Juntos, deberán enfrentar desafíos inesperados y aprender a confiar el uno en el otro para encontrar la forma de devolver a Arco a su tiempo. Esta aventura, luminosa y emotiva, trata sobre la amistad, la colaboración y la magia de los viajes temporales.</p>", "tmdb_id": null}, {"id": 3, "title": "Avatar: Fuego y ceniza", "director": "James Cameron", "genre": "Ciencia ficción, Aventura, Acción, Fantasía", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/1e/0a/1e0aff63b4c1fa267e451bf3174a4d5a.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">En la tercera entrega de la saga <i>Avatar</i>, se introduce al Pueblo de las Cenizas, un nuevo clan Na'vi con una visión más agresiva que el resto de pueblos del mundo. A diferencia de los clanes vistos anteriormente, estos Na'vi no dudan en recurrir a la violencia para conseguir sus fines, incluso si eso significa enfrentarse a otros clanes. </p><p class=\"bo-p\">Con esta nueva amenaza, Pandora se convierte en un territorio aún más inestable, donde los conflictos internos ponen en peligro el equilibrio del planeta y obligan a replantear la lucha por su supervivencia.</p>", "tmdb_id": null}, {"id": 4, "title": "Caravan", "director": "Zuzana Kirchnerová-Spidlova", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/95/5e/955edb38570da409f94f0fb2afc01046.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Ester (Anna Geislerová), madre soltera, ansía tomarse un descanso y planea un viaje en solitario a la casa de vacaciones de su amiga en Italia. Cuando no puede llevar a cabo sus planes de viaje como esperaba, no le queda más remedio que llevarse consigo a su hijo David (David Vodstrčil), que tiene una discapacidad intelectual. Lo que estaba pensado como un retiro se convierte en un viaje imprevisto, pero profundamente conmovedor, marcado por la cercanía, los retos y las nuevas perspectivas</p>", "tmdb_id": null}, {"id": 5, "title": "Cleaner: Rescate vertical", "director": "Martin Campbell", "genre": "Acción, Suspense", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/0a/34/0a348e2e6f36cdee2faa7ac806b825c7.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">La trama de la película se centra en una creciente crisis social y política, planteando interrogantes sobre el uso del poder y las consecuencias de la radicalización. Los activistas, inicialmente motivados por un deseo de justicia, se ven rápidamente arrastrados por la violencia y la desesperación de un miembro extremista de su grupo. La historia pone en juego la lealtad, el sacrificio y la moralidad, mientras el protagonista, una mujer que ha dejado atrás su vida militar para trabajar en el sector más humilde, se enfrenta a una lucha épica para salvar a aquellos que ama, así como a desconocidos atrapados en el mismo destino trágico.</p><p class=\"bo-p\">A medida que el tiempo avanza y las tensiones aumentan, Ridley debe usar su ingenio, habilidades y resistencia física para sortear los obstáculos en el interior del rascacielos, mientras una guerra psicológica y moral se libra entre los rehenes, los terroristas y los agentes de seguridad que intentan entrar. A través de este vertiginoso escenario, el público es arrastrado a una carrera contrarreloj cargada de adrenalina, suspenso y giros inesperados.</p>", "tmdb_id": null}, {"id": 6, "title": "Como cabras", "director": "Tyree Dillihay", "genre": "Animación, Comedia, Acción", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/2e/6e/2e6e9d8e986ce5dc29e735c7c0a3fac2.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Una pequeña cabra con un gran corazón sueña con convertirse en una estrella del roarball, un deporte extremo y vertiginoso que se juega en canchas impredecibles y cambiantes. </p><p class=\"bo-p\">Cuando se une a un equipo profesional, se enfrenta no solo a rivales imponentes, sino también a la desconfianza de sus compañeros, mucho más grandes y experimentados. Con determinación, ingenio y coraje, la cabra lucha por ganarse su lugar en el equipo, superar los desafíos del juego y demostrar que, a pesar de su tamaño, tiene lo necesario para brillar en la arena.</p>", "tmdb_id": null}, {"id": 7, "title": "Cumbres Borrascosas", "director": "Emerald Fennell", "genre": "Drama, Romántico", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/40/29/40297cb013081b30dffa9858f56e1e40.jpg", "rating": null, "synopsis": "<p class=\"bo-p\"><i>Cumbres Borrascosas</i>, dirigida por Emerald Fennell y protagonizada por Margot Robbie y Jacob Elordi, es una nueva adaptación del clásico de Emily Brontë. La historia sigue a Heathcliff, un hombre consumido por el rencor tras ser rechazado por su amor de juventud, quien eligió casarse con un hombre rico. </p><p class=\"bo-p\">Su deseo de venganza lo llevará a desatar una tormenta de odio y sufrimiento sobre la familia de la mujer que lo traicionó, en un relato de pasión, obsesión y destrucción.</p>", "tmdb_id": null}, {"id": 8, "title": "EPiC: Elvis Presley in Concert", "director": "Baz Luhrmann", "genre": "Documental, Música", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/10/d8/10d898f6be22dbd1a573aeaed8ddfbfd.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Película-concierto que ofrece una experiencia única al mezclar imágenes inéditas y restauradas de Elvis Presley, con actuaciones en vivo, mostrando al cantante no solo cantando, sino contando su propia historia de manera íntima y personal. A través de este material, seleccionado y remasterizado, se descubren facetas desconocidas de su vida, de su trayectoria musical y de su conexión con el público, acercando al cantante a los espectadores, haciendo que Elvis cobre vida con emocionalidad, nostalgia y la energía que lo convirtió en un icono mundial.</p>", "tmdb_id": null}, {"id": 9, "title": "El agente secreto", "director": "Kleber Mendonça Filho", "genre": "Crimen, Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/77/cc/77cc0442de426a9afa5373651bdc66f7.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">En un Brasil marcado por la represión de la dictadura militar, Marcelo, un hombre de cuarenta años con un pasado lleno de sombras, llega a Recife con la esperanza de empezar de nuevo y reencontrarse con su hijo. Pero su intento de redención se ve amenazado cuando descubre que es vigilado por las fuerzas del régimen. </p><p class=\"bo-p\">Perseguido y con su vida en peligro, Marcelo deberá enfrentarse a viejas culpas y tomar decisiones imposibles mientras las amenazas se ciernen cada vez más cerca. En una ciudad llena de tensión y miedo, el pasado no ha terminado con él.</p>", "tmdb_id": null}, {"id": 10, "title": "El arquitecto", "director": "Stéphane Demoustier", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/54/13/5413dfef1fb0916fdce12ae29d411377.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">En 1983, el gobierno francés lanza el mayor concurso de arquitectura de la historia para coronar el distrito de La Défense en París. Contra todo pronóstico, gana Johan Otto von Spreckelsen, un arquitecto danés apenas conocido. </p><p class=\"bo-p\">Con solo cuatro obras construidas, su casa y tres capillas, “Spreck” pasa de la sombra al centro de atención mundial. Ahora deberá liderar la construcción del majestuoso Arco de la Defensa, un proyecto monumental cargado de implicaciones políticas, económicas y simbólicas.</p>", "tmdb_id": null}, {"id": 11, "title": "El mago del Kremlin", "director": "Olivier Assayas", "genre": "Suspense", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/79/16/791661a754fe3013e3f853b9a6ea6ec2.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">En el turbulento contexto postsoviético de los años 90, un joven artista y productor de televisión comienza a ascender gracias a su talento y habilidad para conectar con las élites. Su ingenio le abre las puertas al círculo más cercano de un agente del KGB con gran ambición política, lo que le convierte en testigo privilegiado del nacimiento de una nueva Rusia.</p><p class=\"bo-p\">Desde dentro del poder, ambos moldean el futuro del país, en un juego donde los límites entre la verdad y la mentira se desdibujan peligrosamente.</p>", "tmdb_id": 1291659}, {"id": 12, "title": "El mal", "director": "Juanma Bajo Ulloa", "genre": "Suspense, Drama", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/9b/dd/9bdd9803bdcf891db50f563493c7740b.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">La película es una intrigante exploración del ser humano y su insaciable necesidad de reconocimiento, mientras enfrenta la incapacidad de aceptar su propio lado oscuro. </p><p class=\"bo-p\">A través de una narrativa de suspense, la película mantiene al espectador en un constante estado de anticipación, sugiriendo que algo inquietante está por suceder, pero dejando en el aire la incógnita de cómo y cuándo se manifestará. La historia no solo busca provocar inquietud, sino que también invita al público a reflexionar sobre sus propias certezas y limitaciones.</p>", "tmdb_id": null}, {"id": 13, "title": "El testamento de Ann Lee", "director": "Mona Fastvold", "genre": "Drama, Histórico, Biopic, Música", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/75/ac/75acd2dd2f513294d8a63e842357a02f.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">La historia se centra en Ann Lee, líder religiosa y fundadora del Movimiento Shaker a finales de la década de 1770, que levantó una de las comunidades utópicas más influyentes en la historia de Estados Unidos. Venerada por sus seguidores como una figura divina, considerada incluso el Jesucristo femenino, Ann inspiró una forma de devoción única basada en la música, la danza y la vida comunitaria.</p><p class=\"bo-p\">El relato explora su visión espiritual, el fervor de sus fieles y cómo sus ideales marcaron un movimiento que buscaba pureza, igualdad y trascendencia en plena era colonial.</p>", "tmdb_id": null}, {"id": 14, "title": "El último vikingo", "director": "Anders Thomas Jensen", "genre": "Comedia, Drama, Suspense", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/81/fd/81fdad0b769d9fb4d3ab258d85892a4d.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Tras cumplir quince años en prisión por un robo, Anker recupera la libertad con un objetivo claro: recuperar el dinero del atraco, escondido por su hermano Manfred. Sin embargo, Manfred ha perdido la memoria por un trastorno mental y ya no recuerda dónde lo enterró. </p><p class=\"bo-p\">Obligados a reencontrarse como hermanos, comienzan un viaje impredecible en busca del tesoro perdido, que los llevará a enfrentarse a su pasado, sus heridas y su verdadera identidad. Los hermanos tendrán que sobreponerse a las dificultades y volver a encontrar el vínculo que los unía.</p>", "tmdb_id": null}, {"id": 15, "title": "Elegir mi vida", "director": "Amélie Bonnin", "genre": "Comedia dramática", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/58/b3/58b36f0671c23cfcc3dd11c532f19b80.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Cécile está a punto de cumplir su gran sueño: abrir su propio restaurante. Sin embargo, una inesperada llamada la obliga a dejar todos sus sueños atrás y volver a su pueblo natal para cuidar a su padre enfermo. Allí, lejos del ritmo frenético de la ciudad, se reencuentra con su primer amor, lo que despierta en ella recuerdos dormidos y emociones que creía superadas. </p><p class=\"bo-p\">Mientras lucha entre sus deseos personales y las obligaciones familiares, Cécile debe replantearse lo que realmente quiere en la vida.</p>", "tmdb_id": 1277884}, {"id": 16, "title": "Fast & Furious 9", "director": "Justin Lin", "genre": "Acción", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/pictures/20/01/31/13/54/0249203.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Las cosas cambian, y ahora Dominic Toretto (Vin Diesel) es padre y su prioridad es proteger a su hijo Brian. Toretto lleva una vida tranquila apartado del mundo, junto a su hijo y su pareja Letty (Michelle Rodriguez). Claro que da igual lo rápido que uno sea, que nadie escapa de su pasado, y a Dom el suyo le acaba de alcanzar. Este conductor de primera, maestro del robo y asesino, tendrá que enfrentarse en esta ocasión a Jacob (John Cena), su propio hermano. Y es que, no hay nada más peligroso que una familia que se odia. Esta película es la novena entrega de la exitosa saga <i>Fast & Furious</i>.</p>", "tmdb_id": null}, {"id": 17, "title": "Fast & Furious X", "director": "Louis Leterrier", "genre": "Acción", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/pictures/23/03/15/17/30/1522817.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Décima entrega de la saga <i>Fast & furious</i>, e inicio de los capítulos finales de la franquicia. Para su desenlace, Dom Toretto (Vin Diesel) vuelve a la carga con más carreras, velocidad y acción desenfrenada. El final del camino comienza. Durante numerosas misiones más que imposibles, Dom Toretto ha sido más rápido que cualquiera de los enemigos que se cruzaron en su camino. Esta vez, él y su familia tendrán que enfrentarse al oponente más letal que jamás hayan conocido. </p><p class=\"bo-p\">Con una sangrienta sed de venganza, un terrible peligro surge del pasado, dispuesto a destruir para siempre todo lo que a Dom le importa. Ahora él y los suyos son el objetivo de Dante (Jason Momoa), el rey brasileño de la droga que ha jurado vengarse y destruir a Toretto y a su familia. Pero, para este final del camino, llegará la caballería, además de armas, coches, coches con cañones, y muchas sorpresas, Dom contará con los fieles Letty Ortiz (Michelle Rodriguez), Tej (Ludacris), Ramsey (Nathalie Emmanuel), Jakob (John Cena), además de Deckard Shaw (Jason Statham).</p>", "tmdb_id": null}, {"id": 18, "title": "Gemma Galgani", "director": "Óscar Parra de Carrizosa", "genre": "Biopic", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/c2/d0/c2d0672d068ce909392339ce1da6fe85.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Italia, finales del siglo XIX. Gemma Galgani exprime con vehemencia su vida, como lo hacen millones de jóvenes en todo el mundo. Siempre deseó ingresar en una orden religiosa, pero el Destino le tenía reservado algo mucho más importante: primero fundaría  la congregación Hijas de Santa Gema y, posteriormente -en los últimos años de su vida- sería una de las primera mujeres con estigmas de origen divino a comienzos del siglo XX.</p>", "tmdb_id": null}, {"id": 19, "title": "Greenland 2", "director": "Ric Roman Waugh", "genre": "Suspense, Acción", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/31/fb/31fb4fd126f37a6fcb48cf22d8584818.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Después de sobrevivir cinco años en un búnker tras el impacto de un cometa, Jeff Garrity, su mujer Allison y su hijo Nathan deciden abandonar su refugio en busca de un lugar habitable en Europa. Su travesía los lleva a un mundo transformado en un infierno por desastres naturales y supervivientes poco amigables, y cada decisión puede marcar la diferencia entre la vida y la muerte. </p><p class=\"bo-p\">En el camino, deberán aprender a confiar el uno en el otro y a adaptarse a un entorno que ha cambiado para siempre, poniendo a prueba su ingenio, coraje y unidad familiar.</p>", "tmdb_id": null}, {"id": 20, "title": "Hamnet", "director": "Chloé Zhao", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/07/8a/078a4f7d4dce42afa5d24bb304747b3a.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">La vida de Agnes, la esposa de William Shakespeare, se ve marcada por el dolor tras la muerte de su hijo Hamnet. En un retrato íntimo y profundamente humano, se muestra su lucha por sobrellevar la pérdida mientras protege a su familia y busca sentido en medio del duelo.</p><p class=\"bo-p\">La historia revela cómo este acontecimiento trágico se convierte en telón de fondo para la creación de Hamlet, una de las obras más emblemáticas de Shakespeare. Con sensibilidad y fuerza emocional, la narración mezcla amor, maternidad y arte, iluminando la figura de Agnes como pilar invisible en la vida del dramaturgo.</p>", "tmdb_id": null}, {"id": 21, "title": "Hasta la montaña", "director": "Sophie Deraspe", "genre": "Comedia dramática", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/f5/8d/f58d25c414e6661204b403c44798679f.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Mathyas, un joven creativo de Montreal cansado del ritmo frenético y vacío de la publicidad, decide romper con todo y seguir un sueño que siempre le había parecido inalcanzable: convertirse en pastor. Se instala en la Provenza, atraído por la idea de una existencia sencilla, en contacto con la naturaleza y los animales. Pero pronto descubre que la vida rural no tiene nada de idílico. El frío, la soledad, las madrugadas interminables y la fragilidad económica del oficio lo enfrentan a sus propias limitaciones y dudas.En medio de esa crisis interior, aparece Élise, una mujer urbana que también ha dado un paso fuera del sistema: una funcionaria que ha dejado su trabajo sin mirar atrás. Su llegada introduce una energía nueva, tanto en la vida de Mathyas como en su aventura pastoral. Juntos deciden emprender una transhumancia, guiando un rebaño de ovejas a través de los caminos montañosos del sur de Francia.A medida que avanzan, los dos protagonistas se transforman. Las montañas, los pastores que encuentran, las dificultades del viaje y la belleza salvaje del paisaje se convierten en un espejo de su propio recorrido interior. Lo que comenzó como una huida del mundo moderno se convierte en una búsqueda de sentido, libertad y pertenencia.</p>", "tmdb_id": null}, {"id": 22, "title": "Hoppers", "director": "Daniel Chong", "genre": "Animación, Aventura, Comedia", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/0f/d8/0fd8f3c56fa2f4bbd9cdf169fa88f569.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Mabel, una joven con una habilidad extraordinaria, puede transferir su mente a un castor robot para infiltrarse en el reino animal. Su misión: descubrir los planes de un ambicioso promotor inmobiliario que amenaza con destruir el hábitat natural. </p><p class=\"bo-p\">En su aventura, Mabel entabla una inesperada amistad con el carismático y sabio Rey Jorge, un castor que lidera a los suyos con nobleza. Juntos, unirán a los animales en una lucha por defender su hogar. Esta historia está llena de humor, ingenio y corazón para la amistad.</p>", "tmdb_id": 1327819}, {"id": 23, "title": "Interstellar", "director": "Christopher Nolan", "genre": "Ciencia ficción, Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/pictures/14/10/02/11/07/341344.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Inspirada en la teoría del experto en relatividad Kip Stepehen Thorne sobre la existencia de los agujeros de gusano, y su función como canal para llevar a cabo los viajes en el tiempo. La historia gira en torno a un grupo de intrépidos exploradores que se adentran por uno de esos agujeros y viajan a través del mismo, encontrándose en otra dimensión. Un mundo desconocido se abre ante ellos y deberán luchar por mantenerse unidos si quieren volver de una pieza.</p><p class=\"bo-p\">La película cuenta con un reparto de lujo con nombres como Matthew McConaughey ('Sahara'), Anne Hathaway ('El caballero oscuro. La leyenda renace'), Jessica Chastain ('La noche más oscura') y Michael Caine ('El caballero oscuro'), todos ellos a las órdenes de Christopher Nolan ('Memento', 'Origen').</p>", "tmdb_id": null}, {"id": 24, "title": "La Fiera", "director": "Salvador Calvo", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/d6/c5/d6c53c32281f0b7facfc1d6619d1b87c.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Un grupo de tres amigos, Carlos, Darío y Armando, apasionados por los deportes de riesgo, descubren la sensación más cercana a desafiar a la gravedad: el salto BASE con traje de alas. Los tres lo prueban y se enamoran de la sensación que les produce.</p><p class=\"bo-p\">Se cuenta su aventura real desde dentro, mostrando el vértigo que produce, los miedos que surgen con el riesgo y la euforia de los que se enfrentan al vacío. El grupo de amigos muestra una historia sobre peligros y compañerismo, que acaba en un viaje brutal y lleno de emociones donde el mayor desafío no está en el aire sino en uno mismo.</p>", "tmdb_id": null}, {"id": 25, "title": "La asistenta", "director": "Paul Feig", "genre": "Suspense", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/71/83/7183a7a55e47f98332d9ef93b5518384.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Basada en la novela de Freida McFadden y adaptada por Rebecca Sonnenshine, la película sigue a Millie (Sydney Sweeney), una joven con problemas que encuentra alivio al empezar de cero como empleada doméstica para Nina (Amanda Seyfried) y Andrew (Luke Sklenar), una pareja adinerada de alta sociedad. </p><p class=\"bo-p\">Sin embargo, pronto descubre que los oscuros secretos que esconden sus jefes son mucho más peligrosos que los suyos propios. A medida que su vida se entrelaza con la de la familia, Millie se enfrenta a verdades inquietantes que pondrán su seguridad y cordura al límite.</p>", "tmdb_id": null}, {"id": 26, "title": "La chica zurda", "director": "Shih-Ching Tsou", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/5b/d4/5bd4170672abf66bff4814c6b28863f4.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Una madre soltera y sus dos hijas vuelven a Taipei tras años en el campo para abrir un puesto en un animado mercado nocturno. Mientras intentan adaptarse al ritmo de la ciudad y llegar a fin de mes, deben enfrentarse a tensiones familiares y a un pasado que resurge. </p><p class=\"bo-p\">La hija pequeña, zurda, recibe una advertencia inquietante de su abuelo: nunca usar su “mano del diablo”. A partir de ese momento, antiguos secretos de tres generaciones comienzan a salir a la luz, obligando a cada una a confrontar sus propias heridas y a redefinir los lazos que las unen.</p>", "tmdb_id": null}, {"id": 27, "title": "La hija pequeña", "director": "Hafsia Herzi", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/76/66/76661f155b1fa03fd3ebcdbf9e4158bd.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Fátima, de 17 años, es la pequeña de tres hermanas y crece en una familia franco-argelina unida y amorosa en los suburbios. Buena estudiante, consigue entrar en la Universidad de París, donde comienza una nueva etapa marcada por la libertad y el descubrimiento personal. </p><p class=\"bo-p\">Al alejarse de su entorno familiar, explora nuevas amistades, relaciones y formas de vivir, mientras navega entre dos mundos culturales que a menudo chocan. Fátima debe enfrentarse a tensiones internas y externas al intentar construir una identidad propia sin renunciar a sus raíces.</p><p class=\"bo-p\"></p>", "tmdb_id": null}, {"id": 28, "title": "La tarta del Presidente", "director": "Hasan Hadi", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/66/57/66579f98069add631ed33500ac48baec.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">En el Iraq de Sadam Husein, donde la vida cotidiana está marcada por la escasez y el miedo, Lamia, una niña de nueve años, se enfrenta a una tarea imposible: conseguir los ingredientes para una tarta de cumpleaños obligatoria en honor al dictador. </p><p class=\"bo-p\">Bajo las duras sanciones internacionales y la vigilancia constante del régimen, Lamia recorre una ciudad desolada, usando su ingenio y valentía para cumplir con el mandato. Cada paso la acerca al riesgo de ser castigada con prisión o incluso la muerte. </p>", "tmdb_id": null}, {"id": 29, "title": "Las locas del obelisco", "director": "Pablo Moreno", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/80/88/8088aa9778341bf51b01adbbfd41fa83.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">A finales del siglo XIX, en un Madrid en plena transformación social y urbana, la vida de varias mujeres de diferentes clases sociales se entrelaza trágicamente en una ciudad marcada por la desigualdad, la hipocresía y la miseria moral. Teresa y Candela, dos hermanas del ámbito rural, llegan a la capital buscando una vida mejor, pero pronto se enfrentan a la crudeza de una ciudad que devora a las jóvenes sin recursos. En paralelo, María Ana Allsopp, una joven aristócrata mexicana afincada en Madrid, experimenta un profundo despertar de conciencia al confrontar el sufrimiento de las mujeres marginadas. Mientras la violencia, el abuso y la indiferencia amenazan con destruir las vidas de quienes luchan por salir adelante, la esperanza renace en la voluntad de unas pocas personas dispuestas a desafiar las normas establecidas. Inspirada por el sacerdote Francisco de Asís Méndez, María Ana decidirá arriesgar su vida cómoda y su estatus para dar voz y refugio a las que nunca la han tenido.</p>", "tmdb_id": null}, {"id": 30, "title": "Los domingos", "director": "Alauda Ruiz de Azúa", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/9e/4a/9e4a3af5d3e43447c08db19eaf6fe4e3.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Ainara es una joven de 17 años brillante y uy idealista que, en lugar de elegir una carrera universitaria como espera su familia, decide entregarse a la vida religiosa, convirtiéndose en monja de clausura. </p><p class=\"bo-p\">Su inesperada decisión hace que los cimientos familiares se sacudan, generando sorpresa, conflictos y un profundo cuestionamiento sobre la fe, la libertad y el destino. A medida que cada miembro afronta la noticia, la familia se enfrenta a una prueba de fuego que cambiará sus vidas para siempre.</p>", "tmdb_id": null}, {"id": 31, "title": "Los miserables: El origen", "director": "Eric Besnard", "genre": "Drama, Histórico", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/5b/4a/5b4aab66543105390f7349c6375fbd6e.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">En 1815, Jean Valjean sale de la cárcel destrozado y rechazado por la sociedad, que aún lo condena por sus crímenes. Vagando sin rumbo y sin tener dónde ir, encuentra refugio en la casa de un clérigo, su hermana y su sirviente, que le ofrecen la oportunidad de perdonarlo. Ante esta ayuda que Jean no esperaba tener, se encuentra en un dilema moral: tendrá que decidir si cede al resentimiento y la amargura o si acepta la bondad y las nuevas oportunidades que le ofrecen para convertirse en un hombre nuevo y distinto.</p>", "tmdb_id": null}, {"id": 32, "title": "Los pecadores", "director": "Ryan Coogler", "genre": "Acción, Suspense, Terror", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/4e/56/4e56af2ac8498963ab5f1e2003f26743.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Ambientada en los años 30, durante época de la Ley Seca, dos hermanos gemelos (interpretados ambos por el actor Michael B. Jordan) vuelven a su ciudad natal varios años después de abandonarla para intentar empezar de cero. </p><p class=\"bo-p\">Pero se dan cuenta de que un poder maligno mucho más temible espera con ganas su regreso a casa: y es que los vampiros han tomado el control del lugar. Ahora, los dos hermanos tendrán que unir fuerzas para acabar con los vampiros que han invadido su ciudad y volver a recuperar la normalidad.</p>", "tmdb_id": null}, {"id": 33, "title": "Línea de extinción", "director": "George Nolfi", "genre": "Ciencia ficción, Suspense, Acción", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/af/48/af48e9e9a2b3f9ff4c349da817d8c434.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">En un mundo devastado en el que solo los lugares situados a más de 2.500 metros son seguras, un padre arriesga todo para proteger a su hijo de las criaturas que acabaron con el 95% de la humanidad. Obligado a bajar hasta La Línea junto a una científica con la que no se lleva bien y una joven con ganas de aventura, tendrán que enfrentarse a peligros que no imaginan mientras buscan las claves para sobrevivir y salvar a la raza humana de la extinción.</p><p class=\"bo-p\">La lucha por sobrevivir  se convierte en un enfrentamiento entre miedo, sacrificio y esperanza.</p>", "tmdb_id": null}, {"id": 34, "title": "Marty Supreme", "director": "Josh Safdie", "genre": "Drama, Biopic", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/a8/e5/a8e58393b089b9ae573a06bf3e3068c9.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Marty Reisman, un carismático buscavidas de Nueva York, descubrió su don para el ping pong en los clubes clandestinos de Manhattan, donde jugaba por dinero. Su estilo llamativo y su audaz juego ofensivo lo llevaron a lo más alto del tenis de mesa, ganando 22 títulos importantes, incluidos dos campeonatos nacionales. </p><p class=\"bo-p\">Icono del espectáculo y la destreza, se convirtió, a los 67 años, en el campeón más veterano en un torneo nacional de deportes de raqueta. Su vida, entre apuestas, desafíos y gloria, es el retrato de un genio rebelde del deporte.</p>", "tmdb_id": null}, {"id": 35, "title": "Muerte de un ciclista", "director": "Juan Antonio Bardem", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/medias/nmedia/18/36/19/49/20452883.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Una pareja de amantes viaja en coche por las carreteras secundarias de Salamanca. Él se llama Juan Fernández Soler, ella María José. Él es profesor de universidad, ella una mujer casada de alto nivel económico. De repente, oyen un fuerte golpe, por lo que paran el vehículo y descubren que acaban de atropellar a un ciclista. Temerosos de que alguien sepa del accidente, y al mismo tiempo los conocidos de las altas esferas de María José descubran lo de su adulterio, sin mucho dudarlo se propondrán ocultar el cadáver y seguir con sus vidas con toda normalidad y disimulo. </p><p class=\"bo-p\">Película hispano-italiana dirigida por Juan Antonio Bardem, basada en un guión escrito por éste y Luis Fernando de Igoa. Protagonizada por Lucía Bosé y Alberto Closas, y con la espectacular y cuidada fotografía de Alfredo Fraile. </p>", "tmdb_id": null}, {"id": 36, "title": "No hay otra opción", "director": "Park Chan-Wook", "genre": "Comedia, Suspense, Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/99/6f/996fc736b397f482daa9eedbf5f41970.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Man-su, un especialista en la fabricación de papel con 25 años de experiencia, está tan satisfecho con su vida que puede decirse sinceramente a sí mismo: «Lo tengo todo». Mientras pasa felizmente sus días con su esposa Miri, sus dos hijos y sus dos perros, Man-su recibe de repente la noticia de que ha sido despedido de su empresa. Sintiéndose como si le hubieran cortado la cabeza con un hacha, Man-su se compromete a encontrar un nuevo trabajo en los próximos tres meses por el bien de su familia. A pesar de su firme determinación de darle un giro a su vida, Man-su pasa más de un año yendo de una entrevista de trabajo a otra, hasta que finalmente consigue un empleo en una tienda minorista. Se encuentra en peligro de perder la casa que tanto le costó comprar.</p>", "tmdb_id": null}, {"id": 37, "title": "No te queda otra", "director": "Jean-Pierre Améris", "genre": "Comedia, Romántico", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/7c/43/7c43dfa578f0f29201b785b63e869fca.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">En un tren que atraviesa los paisajes entre Francia y Suiza camino a Ginebra, el azar reúne a dos personas que parecen vivir en mundos opuestos. Por un lado está Victoire, una mujer habladora, espontánea y absolutamente incapaz de ignorar una oportunidad de conversación. Su entusiasmo por la vida -y por la música- es contagioso… aunque a veces resulte abrumador. Frente a ella se encuentra Antoine Toussaint, una leyenda viva de la canción francesa. Durante décadas ha llenado salas de conciertos y encabezado las listas de éxitos, pero ahora viaja solo, cansado y hastiado de la fama. Agotado por la presión, los recuerdos y una carrera que parece haber perdido su sentido, Antoine intenta pasar desapercibido durante el trayecto.Pero, el plan fracasa en cuanto Victoire lo reconoce...</p>", "tmdb_id": null}, {"id": 38, "title": "Núremberg", "director": "James Vanderbilt", "genre": "Histórico, Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/72/f8/72f8911ca73177c4c0fa4cdc4b476d9d.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Tras la Segunda Guerra Mundial, durante los históricos juicios de Nuremberg, el psiquiatra estadounidense Douglas Kelley tiene la tarea de evaluar la salud mental de los prisioneros nazis para determinar si son aptos para ser juzgados por crímenes de guerra. </p><p class=\"bo-p\">En medio de esta responsabilidad, Kelley se enfrenta a Hermann Göring, mano derecha de Hitler, en una intensa batalla de ingenio y manipulación. Mientras Göring intenta mantener su poder, Kelley debe navegar entre la verdad, la justicia y la psicología de uno de los líderes más peligrosos del Tercer Reich.</p>", "tmdb_id": null}, {"id": 39, "title": "Orwell: 2+2=5", "director": "Raoul Peck", "genre": "Documental", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/b5/b8/b5b83af99150bc5c81c391cbd2ca109c.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Raoul Peck se sumerge de lleno en los últimos meses de vida de George Orwell y en sus obras más visionarias para analizar el origen de conceptos clave como la vigilancia, la verdad manipulada o el control social. </p><p class=\"bo-p\">A través de una mirada crítica y contemporánea, el documental conecta el pensamiento del autor con los desafíos del presente, desvelando cómo sus advertencias siguen más vigentes que nunca. Una reflexión profunda sobre el poder, la libertad y la fragilidad de la verdad en el mundo actual.</p>", "tmdb_id": null}, {"id": 40, "title": "Pillion", "director": "Harry Lighton", "genre": "Drama, Erótico, Comedia, Romántico", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/a2/05/a205ecea7ee491167d8a2eea56708319.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Colin, un hombre solitario, ve su vida transformada al conocer a Ray, un carismático líder de moteros. Lo que comienza como una amistad inesperada evoluciona hacia una relación marcada por una dinámica de sumisión que desafía las estructuras rígidas de Colin. </p><p class=\"bo-p\">A través de esta experiencia intensa y fuera de lo común, Colin confronta sus miedos, se libera de patrones autoimpuestos y experimenta un profundo proceso de autodescubrimiento. La presencia de Ray sacude su rutina y despierta en él una nueva forma de entender el deseo, el poder y la libertad personal.</p>", "tmdb_id": null}, {"id": 41, "title": "Ruta de escape", "director": "Bart Layton", "genre": "Crimen, Suspense", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/b7/67/b767211a1a618183340db6f1b736c908.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Un escurridizo ladrón planea su mayor atraco, con la esperanza de que sea el último, cuando se ve obligado a colaborar con una ejecutiva de seguros desilusionada y a enfrentarse a un rival con métodos más peligrosos. A medida que se acerca el golpe multimillonario, un teniente implacable estrecha el cerco, aumentando el riesgo y difuminando la línea entre cazador y presa. Cada uno deberá asumir las consecuencias de sus decisiones, conscientes de que no hay vuelta atrás, mientras la tensión y la traición amenazan con destruir sus planes y su libertad.</p>", "tmdb_id": null}, {"id": 42, "title": "Salvajes", "director": "Claude Barras", "genre": "Animación", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/fc/4d/fc4d76ddd165446f36164cdb317823ed.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">En Borneo, una isla en el corazón de la selva tropical, Keria vive en un pequeño pueblo cercano a una vasta y rica biodiversidad. Un día, mientras pasea por la plantación de palma aceitera donde su padre trabaja, descubre a un bebé orangután huérfano y desamparado. Este hallazgo, a raíz de la expansión de la plantación que amenaza con destruir el hábitat natural de estos animales, la conmueve profundamente. Junto a su primo Selaï, quien comparte con ella el amor por la naturaleza, Keria decide tomar acción y cuidar del orangután, al que llaman \"Batu\".</p><p class=\"bo-p\">A medida que se acercan más al pequeño orangután, Keria y Selaï descubren las amenazas que acechan no solo a Batu, sino a todo el ecosistema de la selva tropical. Juntos, emprenden una valiente misión para salvar el bosque de la expansión de la palma aceitera, enfrentándose a las dificultades del terreno, la indiferencia de las autoridades locales y los intereses económicos que ponen en peligro la supervivencia de su hogar.</p>", "tmdb_id": null}, {"id": 43, "title": "Scream 7", "director": "Kevin Williamson", "genre": "Terror, Suspense", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/f9/57/f957e82b8374af3029d4e7acc0b62229.png", "rating": null, "synopsis": "<p class=\"bo-p\">Cuando un nuevo asesino Ghostface aparece en el tranquilo y relajaddo pueblo donde Sidney Prescott ha intentado reconstruir su vida, sus peores pesadillas vuelven. Todo se vuelve aún más aterrador cuando su hija se convierte en el nuevo objetivo del enmascarado.</p><p class=\"bo-p\">Obligada a enfrentarse a los traumas que creía enterrados, Sidney deberá enfrentarse a su oscuro pasado y a un enemigo implacable. En una carrera contra el tiempo, madre e hija lucharán por sobrevivir y acabar con la masacre de una vez por todas.</p>", "tmdb_id": null}, {"id": 44, "title": "Sin perdón", "director": "Clint Eastwood", "genre": "Western, Drama", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/pictures/15/10/23/15/45/106018.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">William Munny es un pistolero retirado que vive en el Viejo Oeste. Viudo, con hijos a su cargo y atravesando problemas económicos que desgraciadamente no le permiten llevar una vida muy holgada, Munny no tendrá más remedio que aceptar un último trabajo para hacer frente a sus gastos. Junto a un antiguo compañero y la compañía de un joven inexperto, su misión consistirá en matar a dos hombres que han sido acusados de cortarle la cara a una prostituta.</p><p class=\"bo-p\">Este famoso <i>western</i> está dirigido y protagonizado por Clint Eastwood (<i>Gran Torino</i>, <i>Million Dollar Baby, Los puentes de Madison</i>) y cuenta con un reparto formado por grandes estrellas de cine como Morgan Freeman (<i>Cadena perpetua</i>, <i>Seven</i>), Jaimz Woolvett (<i>Efecto 2000</i>, <i>Juana de Arco</i>), Gene Hackman (<i>Enemigo público, El útlimo golpe</i>), Richard Harris (<i>Gladiator, Harry Potter y la piedra filosofal</i>), Saul Rubinek (<i>Family Man, Amor a quemarropa</i>), Frances Fisher (<i>Titanic, Casa de arena y niebla</i>) y Anna Levine (<i>Dos policías rebeldes, El Cuervo</i>), entre otros.</p>", "tmdb_id": null}, {"id": 45, "title": "Sirat. Trance en el desierto", "director": "Oliver Laxe", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/91/0e/910e1769a90e9d5d92788000a03c3057.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Un hombre y su hijo llegan a una fiesta al aire libre en medio de las áridas y oscuras montañas del sur de Marruecos. Buscan allí a Marina -su hija y hermana- que desapareció hace meses en una de estos macroeventos. Empujados por el destino, deciden seguir a un grupo de festivaleros en la búsqueda de una último festival que se celebrará en el desierto, con la esperanza de que en ella se encuentre a la joven.</p>", "tmdb_id": null}, {"id": 46, "title": "Sorry, Baby", "director": "Eva Victor", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/7f/9f/7f9f1cde0cf3f9c63d93ecd33c3f7d5f.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Agnes tiene que enfrentarse y superar las secuelas de un evento traumático mientras intenta encontrar su camino hacia su bienestar. Intentará hacerlo con el apoyo de su mejor amiga, su vecina y un pequeño gatito. Así, intentará volver a conectar con la vida cotidiana. </p><p class=\"bo-p\">Un sándwich preparado con cariño se convierte en el inesperado consuelo en su proceso de recuperación. Gracias a pequeños gestos de amor y amistad, Agnes intenta superar su dolor, recordando que, aunque las cicatrices se queden, la vida sigue adelante.</p>", "tmdb_id": null}, {"id": 47, "title": "Tafiti y sus amigos", "director": "Nina Wels", "genre": "Animación, Familia, Aventura", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/90/a5/90a558c0e47ff39af3eb5bb05cf738db.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">En la magnífica sabana africana acechan muchos peligros, especialmente para una suricata como nuestro héroe Tafiti. Su abuelo Opapa le enseña que el mundo está lleno de riesgos y que es mejor que se mantengan entre ellos. Pero Tafiti no puede seguir este consejo y se apresura a rescatar a Pinsel, un cerdo de orejas de pincel. Entonces, una serpiente venenosa se cuela y muerde a Opapa. La única esperanza de salvación es una rara flor azul que florece al otro lado del desierto. Tafiti promete mantenerse alejado de los demás a partir de ahora, pero eso resulta más difícil de lo que pensaba. Pinsel sigue a Tafiti para saldar su deuda. Juntos, siguiendo el consejo de Opapa, se adentran en el infinito desierto, donde luchan por sobrevivir y crecen juntos en su mayor aventura.</p>", "tmdb_id": 1437198}, {"id": 48, "title": "Torrente presidente", "director": "Santiago Segura", "genre": "Comedia", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/img/ce/63/ce63bc4bd27995d49be93a2891504e53.png", "rating": null, "synopsis": "<p class=\"bo-p\">Una tarde a la hora de la comida en un bar. Allí, dos importantes afiliados al parido de extrema derecha NOX, se fijan en la actitud y el magnetismo que desprende Jose Luis Torrente con los parroquianos del lugar, y deciden invitarle para hablar en un par de mítines. Lo que estos dos jóvenes desconocen es que abren la caja de los truenos y Torrente poco a poco comienza a ganar poder dentro del partido y su discurso fascista empieza a calar entre los votantes. A partir de ahí comienzan una serie de acontecimientos a cada cual más surrealista, en la sexta sátira de la sociedad española -a manos del director y actor Santiago Segura- vista desde la óptica del policía más marrano e irreverente del cine español.</p>", "tmdb_id": null}, {"id": 49, "title": "Tres adioses", "director": "Isabel Coixet", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/f4/0e/f40e5bf6fa7c09e667c1f159c50c88c2.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Tras una discusión que no parece gran cosa, Marta y Antonio deciden separarse. Él, un chef en ascenso, se vuelca en la cocina para superar la ruptura, mientras ella se sumerge en un silencio que pronto revela algo más que tristeza: ha perdido el apetito. Cuando descubre que su malestar esconde un problema de salud, su vida cambia por completo.</p><p class=\"bo-p\">De pronto, los sentidos se intensifican: la comida recupera su sabor, la música la conmueve y el deseo renace, impulsándola a vivir plenamente y sin miedo.</p>", "tmdb_id": null}, {"id": 50, "title": "Una batalla tras otra", "director": "Paul Thomas Anderson", "genre": "Acción, Drama, Comedia", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/a6/af/a6af650c0fe2634ffe65b610e02fe489.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Bob Ferguson es un ex revolucionario cuya vida da un giro cuando su hija es secuestrada por un enemigo de su pasado. Desesperado por recuperarla, Bob se ve obligado a confrontar viejas heridas y a recurrir a un grupo de antiguos compañeros revolucionarios liderados por el experimentado Sensei Sergio.</p><p class=\"bo-p\">Juntos planean enfrentarse a fuerzas peligrosas, combinando astucia, estrategia y habilidades adquiridas en su pasado militante. La historia mezcla acción, suspenso y redención mientras Bob lucha por salvar a su hija y reconciliarse con su historia.</p>", "tmdb_id": null}, {"id": 51, "title": "Una hija en Tokio", "director": "Guillaume Senez", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/7d/3d/7d3d7bfde0c5ca13e16ff92ffbf6495b.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Jay es un taxista que ha pasado 13 años en Japón y recorre las calles de Tokio cada noche mientras carga con la ausencia de su hija, Lily, a quien no ha visto en casi una década. Después de una dolorosa separación, Jay perdió el derecho a la custodia compartida y, tras años de búsqueda sin éxito, se ha vuelto a Francia. </p><p class=\"bo-p\">Sin embargo, justo cuando está a punto de abandonar el país y su esperanza, un encuentro inesperado sucede: una noche, Lily sube a su taxi, dándole a Jay una oportunidad inesperada de reencontrarse con su hija.</p>", "tmdb_id": 1021643}, {"id": 52, "title": "Valor sentimental", "director": "Joachim Trier", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/35/66/35661f40931132d1af3e82b56fed553f.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Nora y su hermana Agnes intentan superar la reciente pérdida de su madre cuando su padre, Gustav, regresa de forma inesperada a sus vidas. Con la intención de volver a conectar, Gustav les presenta un guion que ha escrito, ofreciéndole a Nora el papel principal. Pero Nora, que aún está dolida y desconfía, lo rechaza de forma tajante. </p><p class=\"bo-p\">Mientras las tensiones familiares van creciendo, las tres personas enfrentan viejas heridas, silencios incómodos y la difícil tarea de reconstruir los lazos rotos por el tiempo y el dolor.</p>", "tmdb_id": null}, {"id": 53, "title": "Wendy y Lucy", "director": "Kelly Reichardt", "genre": "Drama", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/medias/nmedia/18/72/95/93/19283537.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Esta película es un drama de nacionalidad estadounidense dirigida por Kelly Reichardt  (‘Night Moves’, ‘Meek's Cutoff’) que cuenta la historia de Wendy y de su fiel amiga, su perra Lucy.</p><p class=\"bo-p\">Wendy (Michelle Williams ‘Mi semana con Marilyn’, ‘Shutter Island’ ‘La lista’) viaja acompañada de su perra hacia Alaska, donde va a comenzar a trabajar en una fábrica de conservas. En el trayecto, su coche se estropea y las deja tiradas en un pueblo de Oregón. El calvario de la joven no se detiene allí puesto que, sin dinero ni comida, trata de vender varias latas que encuentra por las calles del pequeño pueblo. Sin éxito, la joven se dirige a robar en una tienda comida para Lucy, que ya empieza a quejarse de hambre. Pero es descubierta por el agente de seguridad de la tienda y detenida en la comisaría del pueblo de Oregón. Para cuando sale de allí ocurre la tragedia: Lucy ha desaparecido. </p><p class=\"bo-p\">Wendy comienza un largo y difícil camino tratando de recuperar a Lucy, mientras su coche permanece en el taller, cuya factura de reparación tendrá que pagar, con la cartera ya casi vacía.</p>", "tmdb_id": null}, {"id": 54, "title": "Whistle: El silbido del mal", "director": "Corin Hardy", "genre": "Terror", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/6b/a0/6ba0fbaa8f5734ee8d0b85195b9b6b3b.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Un grupo de estudiantes inadaptados encuentra accidentalmente un antiguo silbato azteca maldito. Al soplarlo, liberan un terrorífico sonido que invoca sus futuras muertes, convirtiéndose en presas de un destino mortal.</p><p class=\"bo-p\">A medida que las víctimas se multiplican, los amigos luchan contra el miedo y la desesperación para descubrir el origen del artefacto y detener la cadena de sucesos macabros que han desatado, enfrentándose a fuerzas sobrenaturales que desafían toda lógica y ponen a prueba su valor y su amistad.</p>", "tmdb_id": 1193501}, {"id": 55, "title": "Your Name", "director": "Makoto Shinkai", "genre": "Animación, Fantasía", "duration_min": null, "poster_url": "https://es.web.img2.acsta.net/pictures/17/02/08/13/45/536055.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">La joven Mitsuha vive en un pequeño pueblecito entre las montañas. Sin muchas sorpresas ni demasiadas emociones, la adolescente tiene un par de amigos, además de a su hermana pequeña, su abuela y su padre, con el que tiene una relación algo distante. La única expectación un poco emocionante es el cometa Tiamat, que está pasando cerca de la Tierra y por unos días será visible a simple vista. </p><p class=\"bo-p\">Pero un día despierta y descubre con asombro que no reconoce su cuerpo, y piensa que se trata de un extraño sueño. Pero no es así: se encuentra dentro del cuerpo de un chico, concretamente de Taki, un joven estudiante de bachillerato de la gran ciudad de Tokio. A Taki le sucederá lo mismo, y es Mitsuha la que se intercambia con él. Metidos dentro de un cuerpo que les resulta tan extraño, poco a poco, los dos jóvenes empiezan a comunicarse y, torpemente, van superando los retos que se presentan en ambas vidas. De esta forma, el vínculo que tienen se convierte en algo más. Lo que no saben es que algo inesperado está a punto de ser revelado. </p><p class=\"bo-p\">Filme de animación dirigido por el nipón Makoto Shinkai, responsable de filmes como <i>El jardín de las palabras</i> (2013),<i> Viaje a Agartha</i> (2011) o<i> 5 centímetros por segundo</i> (2007). </p><p class=\"bo-p\"> </p>", "tmdb_id": null}, {"id": 56, "title": "Zootrópolis 2", "director": "Byron Howard | Jared Bush", "genre": "Animación, Aventura, Familia, Comedia", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/95/4c/954c30eb27156ff168370a46ca2a3f5b.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">Judy y Nick se enfrentan a un nuevo y enigmático desafío cuando un misterioso reptil llega a Zootopia y altera por completo la vida en la metrópolis de los mamíferos. Siguiendo su peligrosa pista, ambos se ven obligados a meterse de incógnito en rincones que nunca antes habían explorado de la ciudad, donde descubrirán secretos ocultos y se toparán con inesperados obstáculos.</p><p class=\"bo-p\">En medio de esta misión, su sociedad (cada vez más sólida pero también más exigida) será puesta a prueba como nunca, revelando la fuerza y los límites de su unión.</p>", "tmdb_id": null}, {"id": 57, "title": "¡La novia!", "director": "Maggie Gyllenhaal", "genre": "Drama, Suspense, Romántico, Ciencia ficción, Terror", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/aa/05/aa0515d133a7885cf864d3e9b0fc747e.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">En el Chicago de los años 30, Frankenstein recurre al Dr. Euphronius para crear una compañera, dando vida a una mujer asesinada conocida como la Novia. Esta petición despierta una intensa relación entre ambos, mientras la policía comienza a investigar los extraños sucesos.</p><p class=\"bo-p\">La presencia de la Novia no solo genera un inesperado romance, sino que también provoca un cambio social que desafía las normas de la época y transforma la percepción de la vida, la muerte y las relaciones humanas en la ciudad.</p>", "tmdb_id": null}, {"id": 58, "title": "Águilas de el Cairo", "director": "Tarik Saleh", "genre": "Drama, Suspense", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/img/59/3f/593fa084b0908ac3b76af3373681d602.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">George Fahmy, el actor más querido de Egipto, es presionado para protagonizar una película encargada por las altas esferas del poder. Aunque acepta a regañadientes, el papel lo introduce en un círculo privilegiado y peligroso. </p><p class=\"bo-p\">Fascinado por el poder, George comienza un romance prohibido con la enigmática esposa del general que dirige el proyecto. Como una polilla atraída por la luz, su ambición y deseo lo arrastran a una red de secretos y traiciones que pondrá en riesgo su carrera, su libertad y su vida.</p>", "tmdb_id": null}, {"id": 59, "title": "Ángeles y demonios", "director": "Gregory Widen", "genre": "Suspense, Terror, Fantasía", "duration_min": null, "poster_url": "https://es.web.img3.acsta.net/pictures/210/562/21056240_20131108145518579.jpg", "rating": null, "synopsis": "<p class=\"bo-p\">El ángel Gabriel, harto de que Dios centre toda su atención en los seres humanos, decide acabar con la paz en el cielo y destruir la raza humana en la Tierra. Su plan principal consiste en dar muerte a todos los ángeles buenos, pero para ello necesita la ayuda de un humano, y cree haberlo encontrado en un malvado veterano de guerra que acaba de fallecer. El buen ángel Simon decide advertir al Detective Thomas Dagget. Éste, que en su juventud estuvo a punto de convertirse en sacerdote, abandonó la iglesia porque comenzó a ser acosado por unas horribles visiones. Al descubrir el cadáver de un hombre con una fisionomía muy diferente a la del ser humano, comienza a ser partícipe de la guerra de los cielos.</p><p class=\"bo-p\"> 'Ángeles y demonios' es la primera entrega de una serie de cinco películas basadas en la lucha entre ángeles. Fue escrita y dirigida por Gregory Widen y protagonizada por Christopher Walken como Gabriel, Viggo Mortensen como Lucifer, Eric Stotlz en el papel de Simon, Virginia Madsen como Katherine y Elias Koteas como Thomas Dagget.</p>", "tmdb_id": null}];
